<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KIMERICA – GOLDEN STRAWBERRIES</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@900&family=Space+Mono:wght@400&display=swap');
  
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { margin: 0; overflow: hidden; background: #ff0000; }

  nav {
    position: fixed;
    top: 0; left: 0; width: 100%;
    padding: 30px 40px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    z-index: 10000;
  }

  .brand {
    font-family: 'Space Mono', monospace;
    font-size: 0.85rem;
    letter-spacing: 0.6em;
    color: #ffffff;
    text-transform: uppercase;
    text-decoration: none;
  }

  .menu-btn {
    width: 32px; height: 12px;
    display: flex; flex-direction: column; justify-content: space-between;
    cursor: pointer;
  }

  .menu-btn span { display: block; width: 100%; height: 2px; background: #ffffff; }

  #title {
    position: fixed;
    top: 45%; left: 50%;
    transform: translate(-50%, -50%);
    width: 100%; text-align: center;
    font-family: 'Playfair Display', serif;
    font-size: clamp(3rem, 18vw, 12rem);
    letter-spacing: 0.1em;
    color: #ffffff;
    z-index: 1;
    pointer-events: none;
    white-space: nowrap;
  }

  canvas { position: absolute; top: 0; left: 0; z-index: 5; cursor: grab; }
</style>
</head>
<body>

<nav>
  <a href="#" class="brand">KIMERICA</a>
  <div class="menu-btn"><span></span><span></span></div>
</nav>

<div id="title">LOVE ONG</div>
<canvas id="canvas3d"></canvas>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

<script>
(function() {
  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(35, window.innerWidth / window.innerHeight, 0.1, 1000);
  const renderer = new THREE.WebGLRenderer({ 
    canvas: document.getElementById('canvas3d'), 
    antialias: true,
    alpha: true 
  });
  
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 2.2; // Control de brillo para el oro

  camera.position.z = 25;

  // LUZ DE ALTA INTENSIDAD (TIPO ESTUDIO JOYERÍA)
  const amb = new THREE.AmbientLight(0xffffff, 0.8);
  scene.add(amb);
  
  const sun = new THREE.DirectionalLight(0xffffff, 3);
  sun.position.set(5, 15, 10);
  scene.add(sun);

  const goldRim = new THREE.PointLight(0xffaa00, 4);
  goldRim.position.set(-10, -5, 10);
  scene.add(goldRim);

  const objects = [];
  const loader = new THREE.GLTFLoader();

  let vSize = { w: 0, h: 0 };
  function updateLimits() {
    const fov = (camera.fov * Math.PI) / 180;
    vSize.h = 2 * Math.tan(fov / 2) * camera.position.z;
    vSize.w = vSize.h * camera.aspect;
  }
  updateLimits();

  loader.load('Meshy_AI_morango_0506164222_texture.glb', (gltf) => {
    const master = gltf.scene;
    const count = 180; // Cantidad máxima para llenar el espacio

    for (let i = 0; i < count; i++) {
      const model = master.clone();
      const s = 1.3 + Math.random() * 1.8;
      model.scale.set(s, s, s);

      model.traverse(n => {
        if (n.isMesh) {
          // COLOR ORO REALISTA
          n.material.color.setHex(0xe5b80b); 
          n.material.metalness = 1.0;
          n.material.roughness = 0.12; // Menos "globo", más metal sólido
          n.material.emissive = new THREE.Color(0x221100);
          n.material.emissiveIntensity = 0.5;
        }
      });

      // Posición inicial: Lluvia desde arriba para que se apilen
      model.position.set(
        (Math.random() - 0.5) * vSize.w,
        (Math.random() * vSize.h) + (i * 0.2), // Escalado para que no aparezcan todas juntas
        (Math.random() - 0.5) * 3
      );

      scene.add(model);
      objects.push({
        mesh: model,
        r: s * 0.7, // Radio de colisión sólida
        v: new THREE.Vector2(0, -5),
        drag: false
      });
    }
  });

  const GRAVITY = -12; // Gravedad más pesada
  const FRICTION = 0.92; // Resistencia para que no reboten como globos

  function loop() {
    const dt = 0.016;

    for (let i = 0; i < objects.length; i++) {
      const o = objects[i];
      if (o.drag) continue;

      // Aplicar física de caída sólida
      o.v.y += GRAVITY * dt;
      o.v.multiplyScalar(FRICTION);
      o.mesh.position.y += o.v.y * dt;
      o.mesh.position.x += o.v.x * dt;

      // COLISIONES ENTRE ELLAS (APILAMIENTO)
      for (let j = i + 1; j < objects.length; j++) {
        const other = objects[j];
        const dx = other.mesh.position.x - o.mesh.position.x;
        const dy = other.mesh.position.y - o.mesh.position.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        const min = o.r + other.r;

        if (dist < min) {
          const angle = Math.atan2(dy, dx);
          const overlap = min - dist;
          
          // Empuje de separación para que no se traslapen
          const moveX = Math.cos(angle) * overlap * 0.5;
          const moveY = Math.sin(angle) * overlap * 0.5;
          
          o.mesh.position.x -= moveX;
          o.mesh.position.y -= moveY;
          other.mesh.position.x += moveX;
          other.mesh.position.y += moveY;

          // Transferencia de energía (frenado por contacto)
          o.v.multiplyScalar(0.8);
          other.v.multiplyScalar(0.8);
        }
      }

      // LÍMITES DE LA CAJA (PANTALLA)
      const floor = -vSize.h / 2 + o.r;
      if (o.mesh.position.y < floor) {
        o.mesh.position.y = floor;
        o.v.y *= -0.1; // Casi nada de rebote
        o.v.x *= 0.5;
      }
      
      const wall = vSize.w / 2 - o.r;
      if (Math.abs(o.mesh.position.x) > wall) {
        o.mesh.position.x = Math.sign(o.mesh.position.x) * wall;
        o.v.x *= -0.3;
      }
    }

    renderer.render(scene, camera);
    requestAnimationFrame(loop);
  }

  // INTERACCIÓN MOUSE/TOUCH
  const ray = new THREE.Raycaster();
  const mouse = new THREE.Vector2();
  let active = null;

  function handleDown(e) {
    if (e.target.closest('nav')) return;
    const x = e.touches ? e.touches[0].clientX : e.clientX;
    const y = e.touches ? e.touches[0].clientY : e.clientY;
    mouse.x = (x / window.innerWidth) * 2 - 1;
    mouse.y = -(y / window.innerHeight) * 2 + 1;

    ray.setFromCamera(mouse, camera);
    const hits = ray.intersectObjects(objects.map(o => o.mesh), true);
    if (hits.length > 0) {
      let root = hits[0].object;
      while(root.parent && !objects.find(o => o.mesh === root)) root = root.parent;
      active = objects.find(o => o.mesh === root);
      if (active) active.drag = true;
    }
  }

  window.addEventListener('mousedown', handleDown);
  window.addEventListener('touchstart', handleDown);
  window.addEventListener('mousemove', (e) => {
    if (!active) return;
    const x = e.touches ? e.touches[0].clientX : e.clientX;
    const y = e.touches ? e.touches[0].clientY : e.clientY;
    mouse.x = (x / window.innerWidth) * 2 - 1;
    mouse.y = -(y / window.innerHeight) * 2 + 1;
    const v = new THREE.Vector3(mouse.x, mouse.y, 0.5).unproject(camera);
    const d = v.sub(camera.position).normalize();
    const p = camera.position.clone().add(d.multiplyScalar(-camera.position.z / d.z));
    active.mesh.position.copy(p);
  });
  window.addEventListener('mouseup', () => { if(active) active.drag = false; active = null; });
  window.addEventListener('touchend', () => { if(active) active.drag = false; active = null; });

  loop();
})();
</script>
</body>
</html>
