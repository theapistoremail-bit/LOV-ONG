<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ONG – FINAL LUXE</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@900&family=Space+Mono:wght@400&display=swap');
  
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { margin: 0; overflow: hidden; background: #ff0000; }

  /* NAVEGACIÓN: Capa superior absoluta */
  nav {
    position: fixed;
    top: 0; left: 0; width: 100%;
    padding: 30px 40px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    z-index: 2000; /* Lo más alto */
  }

  .brand {
    font-family: 'Space Mono', monospace;
    font-size: 0.9rem;
    letter-spacing: 0.6em;
    color: #ffffff;
    text-transform: uppercase;
    text-decoration: none;
    pointer-events: auto;
  }

  /* BURGER MENU: 3 LÍNEAS */
  .menu-btn {
    width: 30px;
    height: 20px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    cursor: pointer;
    pointer-events: auto;
  }

  .menu-btn span {
    display: block;
    width: 100%;
    height: 2px;
    background: #ffffff;
    transition: 0.3s;
  }

  /* TÍTULO: ENFRENTE DEL CANVAS */
  #title-container {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 1000; /* Por encima de las fresas */
    pointer-events: none; /* Permite que el ratón pase a través de las letras hacia las fresas */
  }

  #title-container h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(3rem, 18vw, 12rem);
    letter-spacing: 0.1em;
    color: #ffffff;
    white-space: nowrap;
    text-align: center;
  }

  /* CANVAS: DETRÁS DE TODO */
  #canvas3d {
    position: absolute;
    top: 0; left: 0;
    z-index: 1; /* La capa más baja */
    outline: none;
  }
</style>
</head>
<body>

<nav>
  <a href="#" class="brand">ONG</a>
  <div class="menu-btn" onclick="alert('Menu Open')">
    <span></span>
    <span></span>
    <span></span> </div>
</nav>

<div id="title-container">
  <h1>LOVE ONG</h1>
</div>

<canvas id="canvas3d"></canvas>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

<script>
(function() {
  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(35, window.innerWidth / window.innerHeight, 0.1, 1000);
  const renderer = new THREE.WebGLRenderer({ 
    canvas: document.getElementById('canvas3d'), 
    antialias: true,
    alpha: true 
  });
  
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 2.5;

  camera.position.z = 24;

  // LUCES
  scene.add(new THREE.AmbientLight(0xffffff, 0.5));
  const sun = new THREE.DirectionalLight(0xffffff, 3);
  sun.position.set(5, 15, 10);
  scene.add(sun);

  const objects = [];
  const loader = new THREE.GLTFLoader();

  let vSize = { w: 0, h: 0 };
  function updateLimits() {
    const fov = (camera.fov * Math.PI) / 180;
    vSize.h = 2 * Math.tan(fov / 2) * camera.position.z;
    vSize.w = vSize.h * camera.aspect;
  }
  updateLimits();

  loader.load('Meshy_AI_morango_0506164222_texture.glb', (gltf) => {
    const master = gltf.scene;
    for (let i = 0; i < 160; i++) {
      const model = master.clone();
      const s = Math.random() > 0.8 ? (2.2 + Math.random()) : (0.5 + Math.random() * 1.2);
      model.scale.set(s, s, s);

      model.traverse(n => {
        if (n.isMesh) {
          n.material.color.setHex(0xFFD700); 
          n.material.metalness = 1.0;
          n.material.roughness = 0.1;
        }
      });

      model.position.set(
        (Math.random() - 0.5) * vSize.w * 1.5,
        (Math.random() - 0.5) * vSize.h * 2,
        (Math.random() - 0.5) * 5
      );

      const item = {
        mesh: model,
        speed: 0.03 + Math.random() * 0.08,
        rot: new THREE.Vector3(Math.random()*0.02, Math.random()*0.01, Math.random()*0.02),
        isDragging: false
      };
      scene.add(model);
      objects.push(item);
    }
  });

  function loop() {
    objects.forEach(o => {
      if (!o.isDragging) {
        o.mesh.position.y -= o.speed;
        o.mesh.rotation.y += o.rot.y;
        if (o.mesh.position.y < -vSize.h / 1.5) {
          o.mesh.position.y = vSize.h / 1.5;
          o.mesh.position.x = (Math.random() - 0.5) * vSize.w * 1.5;
        }
      }
    });
    renderer.render(scene, camera);
    requestAnimationFrame(loop);
  }

  // INTERACCIÓN
  const ray = new THREE.Raycaster();
  const mouse = new THREE.Vector2();
  let selected = null;

  function handleDown(e) {
    if (e.target.closest('nav')) return;
    const x = e.touches ? e.touches[0].clientX : e.clientX;
    const y = e.touches ? e.touches[0].clientY : e.clientY;
    mouse.x = (x / window.innerWidth) * 2 - 1;
    mouse.y = -(y / window.innerHeight) * 2 + 1;
    ray.setFromCamera(mouse, camera);
    const hits = ray.intersectObjects(objects.map(o => o.mesh), true);
    if (hits.length > 0) {
      let root = hits[0].object;
      while(root.parent && !objects.find(o => o.mesh === root)) root = root.parent;
      selected = objects.find(o => o.mesh === root);
      if (selected) selected.isDragging = true;
    }
  }

  function handleMove(e) {
    if (!selected) return;
    const x = e.touches ? e.touches[0].clientX : e.clientX;
    const y = e.touches ? e.touches[0].clientY : e.clientY;
    mouse.x = (x / window.innerWidth) * 2 - 1;
    mouse.y = -(y / window.innerHeight) * 2 + 1;
    const v = new THREE.Vector3(mouse.x, mouse.y, 0.5).unproject(camera);
    const d = v.sub(camera.position).normalize();
    const p = camera.position.clone().add(d.multiplyScalar(-camera.position.z / d.z));
    selected.mesh.position.copy(p);
  }

  window.addEventListener('mousedown', handleDown);
  window.addEventListener('touchstart', handleDown);
  window.addEventListener('mousemove', handleMove);
  window.addEventListener('touchmove', handleMove);
  window.addEventListener('mouseup', () => { if(selected) selected.isDragging = false; selected = null; });
  window.addEventListener('touchend', () => { if(selected) selected.isDragging = false; selected = null; });

  loop();
})();
</script>
</body>
</html>
