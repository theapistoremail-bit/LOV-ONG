<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kimerica – Luxury Strawberries</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@900&family=Space+Mono:wght@400&display=swap');
  
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  
  body { 
    margin: 0; 
    overflow: hidden; 
    background: #0a0a0a; /* Fondo oscuro para resaltar el oro */
  }

  /* NAVEGACIÓN */
  nav {
    position: fixed;
    top: 0; left: 0; width: 100%;
    padding: 30px 40px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    z-index: 2000;
  }

  .brand {
    font-family: 'Space Mono', monospace;
    font-size: 0.9rem;
    letter-spacing: 0.6em;
    color: #ffffff;
    text-transform: uppercase;
    text-decoration: none;
    pointer-events: auto;
  }

  .menu-btn {
    width: 30px;
    height: 18px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    cursor: pointer;
    pointer-events: auto;
  }

  .menu-btn span {
    display: block;
    width: 100%;
    height: 1px;
    background: #ffffff;
    transition: 0.3s;
  }

  /* TÍTULO CENTRAL */
  #title-container {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 1000;
    pointer-events: none;
  }

  #title-container h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(3.5rem, 15vw, 10rem);
    letter-spacing: -0.02em;
    color: #ffffff;
    white-space: nowrap;
    text-align: center;
    opacity: 0.9;
  }

  /* CANVAS */
  #canvas3d {
    position: absolute;
    top: 0; left: 0;
    z-index: 1;
    outline: none;
  }
</style>
</head>
<body>

<nav>
  <a href="#" class="brand">KIMERICA</a>
  <div class="menu-btn" onclick="console.log('Menu Toggle')">
    <span></span>
    <span></span>
    <span></span>
  </div>
</nav>

<div id="title-container">
  <h1>GOLDEN FRUIT</h1>
</div>

<canvas id="canvas3d"></canvas>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

<script>
(function() {
  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(35, window.innerWidth / window.innerHeight, 0.1, 1000);
  const renderer = new THREE.WebGLRenderer({ 
    canvas: document.getElementById('canvas3d'), 
    antialias: true,
    alpha: true 
  });
  
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 2.2;

  camera.position.z = 24;

  // ILUMINACIÓN LUXURY
  scene.add(new THREE.AmbientLight(0xffffff, 0.4));
  const sun = new THREE.DirectionalLight(0xffffff, 2.5);
  sun.position.set(5, 15, 10);
  scene.add(sun);

  const fillLight = new THREE.PointLight(0xffd700, 1); // Luz cálida dorada
  fillLight.position.set(-10, -10, 5);
  scene.add(fillLight);

  // CARGA DE TEXTURA DORADA
  const textureLoader = new THREE.TextureLoader();
  const goldTexture = textureLoader.load('image.png');
  goldTexture.anisotropy = 16;

  const objects = [];
  const loader = new THREE.GLTFLoader();

  let vSize = { w: 0, h: 0 };
  function updateLimits() {
    const fov = (camera.fov * Math.PI) / 180;
    vSize.h = 2 * Math.tan(fov / 2) * camera.position.z;
    vSize.w = vSize.h * camera.aspect;
  }
  updateLimits();

  // CARGA DEL MODELO
  loader.load('Meshy_AI_morango_0506164222_texture.glb', (gltf) => {
    const master = gltf.scene;
    
    for (let i = 0; i < 150; i++) {
      const model = master.clone();
      const s = Math.random() > 0.85 ? (2.0 + Math.random()) : (0.4 + Math.random() * 1.1);
      model.scale.set(s, s, s);

      model.traverse(n => {
        if (n.isMesh) {
          // APLICACIÓN DE LA TEXTURA SUBIDA
          n.material = new THREE.MeshStandardMaterial({
            map: goldTexture,
            metalness: 1.0,
            roughness: 0.18,
            envMapIntensity: 1.2
          });
        }
      });

      model.position.set(
        (Math.random() - 0.5) * vSize.w * 1.6,
        (Math.random() - 0.5) * vSize.h * 2.5,
        (Math.random() - 0.5) * 6
      );

      const item = {
        mesh: model,
        speed: 0.02 + Math.random() * 0.07,
        rot: new THREE.Vector3(Math.random()*0.015, Math.random()*0.02, Math.random()*0.01),
        isDragging: false
      };
      scene.add(model);
      objects.push(item);
    }
  });

  function loop() {
    objects.forEach(o => {
      if (!o.isDragging) {
        o.mesh.position.y -= o.speed;
        o.mesh.rotation.y += o.rot.y;
        o.mesh.rotation.z += o.rot.z;
        
        // Reposicionar arriba cuando salen de pantalla
        if (o.mesh.position.y < -vSize.h * 0.8) {
          o.mesh.position.y = vSize.h * 0.8;
          o.mesh.position.x = (Math.random() - 0.5) * vSize.w * 1.6;
        }
      }
    });
    renderer.render(scene, camera);
    requestAnimationFrame(loop);
  }

  // INTERACCIÓN MOUSE/TOUCH
  const ray = new THREE.Raycaster();
  const mouse = new THREE.Vector2();
  let selected = null;

  function getCoords(e) {
    const x = e.touches ? e.touches[0].clientX : e.clientX;
    const y = e.touches ? e.touches[0].clientY : e.clientY;
    return {
      x: (x / window.innerWidth) * 2 - 1,
      y: -(y / window.innerHeight) * 2 + 1
    };
  }

  function handleDown(e) {
    if (e.target.closest('nav')) return;
    const coords = getCoords(e);
    mouse.x = coords.x; mouse.y = coords.y;
    
    ray.setFromCamera(mouse, camera);
    const hits = ray.intersectObjects(objects.map(o => o.mesh), true);
    if (hits.length > 0) {
      let root = hits[0].object;
      while(root.parent && !objects.find(o => o.mesh === root)) root = root.parent;
      selected = objects.find(o => o.mesh === root);
      if (selected) selected.isDragging = true;
    }
  }

  function handleMove(e) {
    if (!selected) return;
    const coords = getCoords(e);
    mouse.x = coords.x; mouse.y = coords.y;
    
    const v = new THREE.Vector3(mouse.x, mouse.y, 0.5).unproject(camera);
    const d = v.sub(camera.position).normalize();
    const p = camera.position.clone().add(d.multiplyScalar(-camera.position.z / d.z));
    selected.mesh.position.copy(p);
  }

  window.addEventListener('mousedown', handleDown);
  window.addEventListener('touchstart', handleDown);
  window.addEventListener('mousemove', handleMove);
  window.addEventListener('touchmove', handleMove);
  window.addEventListener('mouseup', () => { if(selected) selected.isDragging = false; selected = null; });
  window.addEventListener('touchend', () => { if(selected) selected.isDragging = false; selected = null; });

  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
    updateLimits();
  });

  loop();
})();
</script>
</body>
</html>
