<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LOVE – Vitrina Interactiva</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@900&family=Space+Mono:wght@400&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: #e60000; /* Fondo Rojo Brillante y Saturado */
  }

  #threeCanvas {
    position: fixed;
    inset: 0;
    width: 100% !important;
    height: 100% !important;
    display: block;
    cursor: grab;
  }
  #threeCanvas:active { cursor: grabbing; }

  #glassFrame {
    position: fixed;
    inset: 0;
    pointer-events: none;
    border: 1px solid rgba(255,215,0,0.2);
    box-shadow: inset 0 0 100px rgba(0,0,0,0.3);
    z-index: 5;
  }

  #titleContainer {
    position: fixed;
    top: 50px; left: 50%;
    transform: translateX(-50%);
    text-align: center;
    z-index: 20;
    pointer-events: none;
    width: 100%;
  }

  #title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2.5rem, 10vw, 6rem);
    letter-spacing: 0.5em; /* Espaciado para que se vea en una línea elegante */
    color: #fff;
    text-shadow: 0 5px 25px rgba(0,0,0,0.5);
    white-space: nowrap; /* Fuerza a estar en una línea */
    display: flex;
    justify-content: center;
    width: 100%;
  }

  /* Efecto dorado Juan/Omar */
  #title::after {
    content: ' BY OMAR & JUAN'; 
    display: block;
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.8em;
    color: #ffd700; /* Dorado Juan/Omar */
    margin-top: 15px;
    opacity: 0.9;
    text-shadow: none;
  }

  #hint {
    position: fixed;
    bottom: 25px; left: 50%;
    transform: translateX(-50%);
    font-family: 'Space Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.4em;
    color: #ffd700;
    text-transform: uppercase;
    z-index: 20;
    background: rgba(0,0,0,0.4);
    padding: 6px 18px;
    border-radius: 20px;
    border: 1px solid rgba(255,215,0,0.2);
  }

  #hamburger {
    position: fixed; top: 25px; left: 25px; z-index: 100;
    width: 50px; height: 50px; cursor: pointer;
    display: flex; flex-direction: column; justify-content: center;
    align-items: center; gap: 5px;
    background: rgba(0,0,0,0.5);
    border: 1px solid #ffd700;
    border-radius: 50%;
  }
  #hamburger span { display: block; width: 22px; height: 2px; background: #ffd700; }
</style>
</head>
<body>

<canvas id="threeCanvas"></canvas>
<div id="glassFrame"></div>

<div id="titleContainer">
  <div id="title">L O V E</div>
</div>

<div id="hint">✦ INTERACTÚA CON LA JOYA ✦</div>

<div id="hamburger" onclick="toggleNav()">
  <span></span><span></span><span></span>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

<script>
(function () {
  const canvas = document.getElementById('threeCanvas');
  const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
  renderer.setPixelRatio(window.devicePixelRatio);
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.shadowMap.enabled = true;
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.6;

  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0xe60000); // Rojo puro

  const camera = new THREE.PerspectiveCamera(40, window.innerWidth / window.innerHeight, 0.1, 1000);
  camera.position.z = 15;

  const BOX = { W: 0, H: 0 };
  function updateBox() {
    const fovRad = (camera.fov * Math.PI) / 180;
    BOX.H = 2 * Math.tan(fovRad / 2) * camera.position.z;
    BOX.W = BOX.H * camera.aspect;
  }

  // Luces intensas tipo joyería
  scene.add(new THREE.AmbientLight(0xffffff, 0.6));
  const sun = new THREE.DirectionalLight(0xffffff, 2.5);
  sun.position.set(5, 10, 7);
  sun.castShadow = true;
  scene.add(sun);

  // Material de Oro Brillante (No globo)
  const goldMaterial = new THREE.MeshStandardMaterial({
    color: 0xffd700,
    metalness: 1.0,
    roughness: 0.15,
    emissive: 0x221100,
    emissiveIntensity: 0.2
  });

  const objects = [];
  const loader = new THREE.GLTFLoader();

  // Cargador de TU malla de fresa
  loader.load('Meshy_AI_morango_0506164222_texture.glb', (gltf) => {
    const sourceModel = gltf.scene;
    const NUM = 50; // Cantidad para llenar hasta arriba

    for (let i = 0; i < NUM; i++) {
      const model = sourceModel.clone();
      
      // Variación de tamaño muy extravagante
      const s = Math.random() < 0.2 ? 2.5 : 0.4 + Math.random() * 0.9;
      model.scale.set(s, s, s);

      model.traverse(n => {
        if (n.isMesh) {
          n.material = goldMaterial;
          n.castShadow = true;
          n.receiveShadow = true;
        }
      });

      // Posición inicial: caen desde arriba
      model.position.set(
        (Math.random() - 0.5) * BOX.W,
        (Math.random() * BOX.H), // Empezando desde arriba para caer
        (Math.random() - 0.5) * 4
      );

      scene.add(model);
      objects.push({
        mesh: model,
        r: s * 0.75, // Radio de colisión físico
        vx: (Math.random() - 0.5) * 4,
        vy: -5, // Inician cayendo
        dragging: false
      });
    }
  });

  // CONSTANTES FÍSICAS DE PESO (Gravedad alta, rebote seco)
  const GRAVITY = -25; 
  const FRICTION = 0.95;
  const BOUNCE = 0.3; // Al tocar el suelo "pesan", rebote corto

  function animate() {
    requestAnimationFrame(animate);
    const dt = 0.016;

    // Físicas y Colisión con bordes
    objects.forEach(o => {
      if (o.dragging) return;

      o.vy += GRAVITY * dt;
      o.mesh.position.x += o.vx * dt;
      o.mesh.position.y += o.vy * dt;
      
      // Rotación inercial
      o.mesh.rotation.y += o.vx * 0.01;

      // Colisión Suelo/Techo
      const limX = BOX.W / 2 - o.r;
      const limY = BOX.H / 2 - o.r;
      
      if (o.mesh.position.y < -limY) {
        o.mesh.position.y = -limY;
        o.vy *= -BOUNCE;
        o.vx *= 0.8; // Fricción al tocar suelo
      }

      if (Math.abs(o.mesh.position.x) > limX) {
        o.vx *= -BOUNCE;
        o.mesh.position.x = Math.sign(o.mesh.position.x) * limX;
      }
    });

    // SISTEMA DE COLISIÓN ENTRE OBJETOS (Para apilarse, no fusionarse)
    for (let i = 0; i < objects.length; i++) {
      for (let j = i + 1; j < objects.length; j++) {
        const a = objects[i];
        const b = objects[j];
        
        const dx = b.mesh.position.x - a.mesh.position.x;
        const dy = b.mesh.position.y - a.mesh.position.y;
        const distance = Math.sqrt(dx * dx + dy * dy);
        const minDist = a.r + b.r;

        if (distance < minDist) {
          // Resolver colisión: Empujarse suavemente
          const angle = Math.atan2(dy, dx);
          const overlap = minDist - distance;
          const separationX = Math.cos(angle) * overlap * 0.5;
          const separationY = Math.sin(angle) * overlap * 0.5;

          a.mesh.position.x -= separationX;
          a.mesh.position.y -= separationY;
          b.mesh.position.x += separationX;
          b.mesh.position.y += separationY;

          // Pequeño intercambio de velocidad para solidez
          const tempVx = a.vx;
          const tempVy = a.vy;
          a.vx = b.vx * 0.4;
          a.vy = b.vy * 0.4;
          b.vx = tempVx * 0.4;
          b.vy = tempVy * 0.4;
        }
      }
    }

    renderer.render(scene, camera);
  }

  window.addEventListener('resize', () => {
    renderer.setSize(window.innerWidth, window.innerHeight);
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    updateBox();
  });

  updateBox();
  animate();

  // Interacción de Grabbing (Arrastrar y Soltar)
  const raycaster = new THREE.Raycaster();
  const mouse = new THREE.Vector2();
  let selected = null;

  function onDown(e) {
    const x = e.touches ? e.touches[0].clientX : e.clientX;
    const y = e.touches ? e.touches[0].clientY : e.clientY;
    mouse.x = (x / window.innerWidth) * 2 - 1;
    mouse.y = -(y / window.innerHeight) * 2 + 1;
    raycaster.setFromCamera(mouse, camera);
    const hits = raycaster.intersectObjects(objects.map(o => o.mesh), true);
    if (hits.length > 0) {
      let root = hits[0].object;
      while (root.parent && !objects.find(o => o.mesh === root)) root = root.parent;
      selected = objects.find(o => o.mesh === root);
      if (selected) {
        selected.dragging = true;
        selected.vy = 0; // Detenemos la caída mientras lo arrastramos
      }
    }
  }

  function onMove(e) {
    if (!selected) return;
    const x = e.touches ? e.touches[0].clientX : e.clientX;
    const y = e.touches ? e.touches[0].clientY : e.clientY;
    mouse.x = (x / window.innerWidth) * 2 - 1;
    mouse.y = -(y / window.innerHeight) * 2 + 1;
    const vector = new THREE.Vector3(mouse.x, mouse.y, 0.5).unproject(camera);
    const dir = vector.sub(camera.position).normalize();
    const dist = -camera.position.z / dir.z;
    const pos = camera.position.clone().add(dir.multiplyScalar(dist));
    
    // Al moverlo, le inyectamos velocidad para que tenga inercia al soltar
    selected.vx = (pos.x - selected.mesh.position.x) * 15;
    selected.vy = (pos.y - selected.mesh.position.y) * 15;
    selected.mesh.position.x = pos.x;
    selected.mesh.position.y = pos.y;
  }

  window.addEventListener('mousedown', onDown);
  window.addEventListener('mousemove', onMove);
  window.addEventListener('mouseup', () => { if (selected) selected.dragging = false; selected = null; });
  window.addEventListener('touchstart', onDown);
  window.addEventListener('touchmove', onMove);
  window.addEventListener('touchend', () => { if (selected) selected.dragging = false; selected = null; });
})();
function toggleNav() { alert("Menú de Kimerica"); }
</script>
</body>
</html>
