<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LOVE ONG – KIMERICA</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@900&family=Space+Mono:wght@400&display=swap');
  
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { margin: 0; overflow: hidden; background: #ff0000; }

  nav {
    position: fixed;
    top: 0; left: 0; width: 100%;
    padding: 30px 40px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    z-index: 10000;
  }

  .brand {
    font-family: 'Space Mono', monospace;
    font-size: 0.85rem;
    letter-spacing: 0.6em;
    color: #ffffff;
    text-transform: uppercase;
    text-decoration: none;
    pointer-events: auto;
  }

  .menu-btn {
    width: 32px; height: 12px;
    display: flex; flex-direction: column; justify-content: space-between;
    cursor: pointer; pointer-events: auto;
  }

  .menu-btn span { display: block; width: 100%; height: 2px; background: #ffffff; }

  #title {
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 100%; text-align: center;
    font-family: 'Playfair Display', serif;
    font-size: clamp(3rem, 18vw, 12rem);
    letter-spacing: 0.3em;
    color: #ffffff;
    z-index: 1;
    pointer-events: none;
    white-space: nowrap;
  }

  canvas { position: absolute; top: 0; left: 0; z-index: 10; cursor: grab; }
  canvas:active { cursor: grabbing; }
</style>
</head>
<body>

<nav>
  <a href="#" class="brand">KIMERICA</a>
  <div class="menu-btn">
    <span></span>
    <span></span>
  </div>
</nav>

<div id="title">LOVE ONG</div>
<canvas id="canvas3d"></canvas>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

<script>
(function() {
  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(35, window.innerWidth / window.innerHeight, 0.1, 1000);
  const renderer = new THREE.WebGLRenderer({ 
    canvas: document.getElementById('canvas3d'), 
    antialias: true,
    alpha: true 
  });
  
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(window.devicePixelRatio);
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 3.0; // Brillo dorado potente

  camera.position.z = 25;

  // ILUMINACIÓN PARA ORO PURO
  const amb = new THREE.AmbientLight(0xffffff, 1.2);
  scene.add(amb);
  
  const sun = new THREE.DirectionalLight(0xffffff, 4);
  sun.position.set(10, 20, 10);
  scene.add(sun);

  const goldSpot = new THREE.PointLight(0xffd700, 5);
  goldSpot.position.set(-15, -5, 10);
  scene.add(goldSpot);

  const objects = [];
  const loader = new THREE.GLTFLoader();

  // Límites dinámicos
  let vSize = { w: 0, h: 0 };
  function updateLimits() {
    const fov = (camera.fov * Math.PI) / 180;
    vSize.h = 2 * Math.tan(fov / 2) * camera.position.z;
    vSize.w = vSize.h * camera.aspect;
  }
  updateLimits();

  loader.load('Meshy_AI_morango_0506164222_texture.glb', (gltf) => {
    const master = gltf.scene;
    for (let i = 0; i < 50; i++) {
      const model = master.clone();
      const s = 1.0 + Math.random() * 2.2;
      model.scale.set(s, s, s);

      model.traverse(n => {
        if (n.isMesh) {
          n.material.color.setHex(0xffaa00);
          n.material.metalness = 1.0;
          n.material.roughness = 0.04;
          n.material.emissive = new THREE.Color(0x331100);
          n.material.emissiveIntensity = 0.4;
        }
      });

      model.position.set(
        (Math.random() - 0.5) * vSize.w,
        (Math.random() - 0.5) * vSize.h,
        (Math.random() - 0.5) * 5
      );

      scene.add(model);
      objects.push({
        mesh: model,
        r: s * 0.8,
        v: new THREE.Vector2((Math.random() - 0.5) * 2, (Math.random() - 0.5) * 2),
        rotV: new THREE.Vector3(Math.random()*0.02, Math.random()*0.02, Math.random()*0.02),
        drag: false
      });
    }
  });

  // FÍSICA CON FLOTABILIDAD
  const GRAVITY = -8; // Gravedad muy suave
  const DAMPING = 0.98; // Resistencia del aire/agua

  function loop() {
    const dt = 0.016;

    objects.forEach((o) => {
      if (o.drag) return;

      // Aplicar fuerzas suaves
      o.v.y += GRAVITY * dt;
      o.v.multiplyScalar(DAMPING); // Efecto de flotabilidad (freno constante)
      
      o.mesh.position.y += o.v.y;
      o.mesh.position.x += o.v.x;
      
      // Rotación constante suave
      o.mesh.rotation.x += o.rotV.x;
      o.mesh.rotation.y += o.rotV.y;

      // Rebote suave en bordes
      const floor = -vSize.h / 2 + o.r;
      const ceiling = vSize.h / 2 - o.r;
      if (o.mesh.position.y < floor) {
        o.mesh.position.y = floor;
        o.v.y *= -0.5;
      } else if (o.mesh.position.y > ceiling) {
        o.mesh.position.y = ceiling;
        o.v.y *= -0.5;
      }

      const wall = vSize.w / 2 - o.r;
      if (Math.abs(o.mesh.position.x) > wall) {
        o.mesh.position.x = Math.sign(o.mesh.position.x) * wall;
        o.v.x *= -0.5;
      }
    });

    renderer.render(scene, camera);
    requestAnimationFrame(loop);
  }

  // INTERACCIÓN
  const ray = new THREE.Raycaster();
  const mouse = new THREE.Vector2();
  let active = null;

  function onPointerMove(e) {
    const x = e.touches ? e.touches[0].clientX : e.clientX;
    const y = e.touches ? e.touches[0].clientY : e.clientY;
    mouse.x = (x / window.innerWidth) * 2 - 1;
    mouse.y = -(y / window.innerHeight) * 2 + 1;

    if (active) {
      const vector = new THREE.Vector3(mouse.x, mouse.y, 0.5).unproject(camera);
      const dir = vector.sub(camera.position).normalize();
      const distance = -camera.position.z / dir.z;
      const pos = camera.position.clone().add(dir.multiplyScalar(distance));
      active.mesh.position.lerp(pos, 0.2); // Movimiento suave al arrastrar
      active.v.set(0, 0);
    }
  }

  function onPointerDown(e) {
    // No interferir con el menú
    if (e.target.closest('nav')) return;

    ray.setFromCamera(mouse, camera);
    const hits = ray.intersectObjects(objects.map(o => o.mesh), true);
    if (hits.length > 0) {
      let root = hits[0].object;
      while(root.parent && !objects.find(o => o.mesh === root)) root = root.parent;
      active = objects.find(o => o.mesh === root);
      if (active) active.drag = true;
    }
  }

  window.addEventListener('mousedown', onPointerDown);
  window.addEventListener('mousemove', onPointerMove);
  window.addEventListener('mouseup', () => { if(active) active.drag = false; active = null; });
  window.addEventListener('touchstart', onPointerDown);
  window.addEventListener('touchmove', onPointerMove);
  window.addEventListener('touchend', () => { if(active) active.drag = false; active = null; });

  window.addEventListener('resize', () => {
    renderer.setSize(window.innerWidth, window.innerHeight);
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    updateLimits();
  });

  loop();
})();
</script>
</body>
</html>
