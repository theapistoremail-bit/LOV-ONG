<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KIMERICA – LOVE RED</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@900&family=Space+Mono:wght@400&display=swap');
  
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  
  body { 
    margin: 0; 
    overflow: hidden; 
    background-color: #ff0000 !important; /* Rojo puro e intenso */
  }

  /* NAVEGACIÓN */
  nav {
    position: fixed;
    top: 0; left: 0; width: 100%;
    padding: 30px 40px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    z-index: 3000;
  }

  .brand {
    font-family: 'Space Mono', monospace;
    font-size: 0.9rem;
    letter-spacing: 0.6em;
    color: #ffffff;
    text-transform: uppercase;
    text-decoration: none;
  }

  .menu-btn {
    width: 30px;
    height: 18px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    cursor: pointer;
    z-index: 4000;
  }

  .menu-btn span {
    display: block;
    width: 100%;
    height: 2px;
    background: #ffffff;
  }

  /* TÍTULO LOVE */
  #title-container {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 100; /* Detrás del canvas */
    pointer-events: none;
  }

  #title-container h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(5rem, 30vw, 20rem);
    color: #ffffff;
    text-align: center;
    font-weight: 900;
    line-height: 0.8;
  }

  /* CANVAS */
  #canvas3d {
    position: absolute;
    top: 0; left: 0;
    z-index: 1000; /* Encima del texto */
    pointer-events: none; 
    mix-blend-mode: normal; /* Asegura que no aclare el fondo */
  }
</style>
</head>
<body>

<nav>
  <a href="#" class="brand">KIMERICA</a>
  <div class="menu-btn" id="burger">
    <span></span>
    <span></span>
    <span></span>
  </div>
</nav>

<div id="title-container">
  <h1>LOVE</h1>
</div>

<canvas id="canvas3d"></canvas>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/cannon.js/0.6.2/cannon.min.js"></script>

<script>
(function() {
  // CONFIGURACIÓN ESCENA
  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(35, window.innerWidth / window.innerHeight, 0.1, 1000);
  const renderer = new THREE.WebGLRenderer({ 
    canvas: document.getElementById('canvas3d'), 
    antialias: true, 
    alpha: true // Para ver el fondo rojo del HTML
  });
  
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(window.devicePixelRatio);
  renderer.toneMapping = THREE.NoToneMapping; // Evita que se "lave" el color
  renderer.outputEncoding = THREE.sRGBEncoding;

  camera.position.set(0, 0, 25);

  // --- LUZ EXTREMA (Para que no se vea negro) ---
  const ambient = new THREE.AmbientLight(0xffffff, 2.0); // Luz global muy fuerte
  scene.add(ambient);

  const frontalLight = new THREE.DirectionalLight(0xffffff, 1.5);
  frontalLight.position.set(0, 5, 10);
  scene.add(frontalLight);

  const rimLight = new THREE.PointLight(0xffffff, 2);
  rimLight.position.set(-10, 10, 10);
  scene.add(rimLight);

  // FÍSICA
  const world = new CANNON.World();
  world.gravity.set(0, -20, 0); 

  // CONTENEDOR (Caja invisible)
  const cW = 16, cH = 30, cD = 5;
  function createWall(w, h, d, x, y, z) {
    const body = new CANNON.Body({ mass: 0 });
    body.addShape(new CANNON.Box(new CANNON.Vec3(w/2, h/2, d/2)));
    body.position.set(x, y, z);
    world.addBody(body);
  }
  createWall(cW, 1, cD, 0, -9, 0); // Suelo (ajustado para que queden abajo)
  createWall(1, cH, cD, -cW/2, 0, 0); // Pared Izq
  createWall(1, cH, cD, cW/2, 0, 0);  // Pared Der
  createWall(cW, cH, 1, 0, 0, -cD/2); // Pared Fondo
  createWall(cW, cH, 1, 0, 0, cD/2);  // Pared Frente

  // TEXTURA
  const textureLoader = new THREE.TextureLoader();
  const goldTexture = textureLoader.load('image.png');
  goldTexture.encoding = THREE.sRGBEncoding;

  const objects = [];
  const loader = new THREE.GLTFLoader();

  loader.load('Meshy_AI_morango_0506164222_texture.glb', (gltf) => {
    const master = gltf.scene;

    for (let i = 0; i < 130; i++) {
      const model = master.clone();
      const s = 0.2 + Math.random() * 0.45;
      model.scale.set(s, s, s);

      model.traverse(n => {
        if (n.isMesh) {
          // Usamos MeshStandardMaterial con alta emisividad para que brille
          n.material = new THREE.MeshStandardMaterial({
            map: goldTexture,
            metalness: 0.5, // Bajamos un poco para que la luz blanca le pegue mejor
            roughness: 0.2,
            emissive: 0xffffff,
            emissiveIntensity: 0.2, // Esto hace que "emita" su propia luz y no se vea negro
            color: 0xffffff
          });
        }
      });

      const body = new CANNON.Body({ 
        mass: 1,
        angularDamping: 0.5 
      });
      body.addShape(new CANNON.Sphere(s * 1.6));
      
      // Aparecen desde arriba de forma aleatoria
      body.position.set(
        (Math.random()-0.5)*12, 
        15 + Math.random()*20, 
        (Math.random()-0.5)*2
      );
      
      world.addBody(body);
      scene.add(model);
      objects.push({ mesh: model, body: body });
    }
  });

  function loop() {
    world.step(1/60);
    objects.forEach(o => {
      o.mesh.position.copy(o.body.position);
      o.mesh.quaternion.copy(o.body.quaternion);
    });
    renderer.render(scene, camera);
    requestAnimationFrame(loop);
  }
  
  window.onresize = () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  };

  loop();
  
  // Burger interactivo básico
  document.getElementById('burger').onclick = () => {
    alert("Menú Kimerica");
  };
})();
</script>
</body>
</html>
