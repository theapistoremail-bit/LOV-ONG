<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KIMERICA – Contained Charms</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@900&family=Space+Mono:wght@400&display=swap');
  
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { 
    margin: 0; 
    overflow: hidden; 
    background: #000000; /* Fondo negro puro */
  }

  nav {
    position: fixed;
    top: 0; left: 0; width: 100%;
    padding: 30px 40px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    z-index: 2000;
  }

  .brand {
    font-family: 'Space Mono', monospace;
    font-size: 0.8rem;
    letter-spacing: 0.8em;
    color: #ffffff;
    text-transform: uppercase;
    text-decoration: none;
  }

  #title-container {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 1000;
    pointer-events: none;
  }

  #title-container h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(3rem, 20vw, 12rem);
    letter-spacing: 0.1em;
    color: #ffffff;
    text-align: center;
  }

  #canvas3d {
    position: absolute;
    top: 0; left: 0;
    z-index: 1;
  }
</style>
</head>
<body>

<nav>
  <a href="#" class="brand">KIMERICA</a>
</nav>

<div id="title-container">
  <h1>LOVE</h1>
</div>

<canvas id="canvas3d"></canvas>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/cannon.js/0.6.2/cannon.min.js"></script>

<script>
(function() {
  // --- CONFIGURACIÓN DE FÍSICA (CANNON.js) ---
  const world = new CANNON.World();
  world.gravity.set(0, -9.82, 0); // Gravedad terrestre
  world.broadphase = new CANNON.NaiveBroadphase();
  world.solver.iterations = 10;

  // Materiales físicos para rebote y fricción
  const groundMaterial = new CANNON.Material("groundMaterial");
  const slipperyMaterial = new CANNON.Material("slipperyMaterial");
  const contactMaterial = new CANNON.ContactMaterial(groundMaterial, slipperyMaterial, {
    friction: 0.1, // Un poco de deslizamiento
    restitution: 0.3 // Ligero rebote
  });
  world.addContactMaterial(contactMaterial);


  // --- CONFIGURACIÓN DE RENDERIZADO (Three.js) ---
  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(35, window.innerWidth / window.innerHeight, 0.1, 1000);
  const renderer = new THREE.WebGLRenderer({ 
    canvas: document.getElementById('canvas3d'), 
    antialias: true,
    alpha: true 
  });
  
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.toneMapping = THREE.LinearToneMapping;
  renderer.toneMappingExposure = 1.8;

  camera.position.set(0, 5, 25);
  camera.lookAt(0, 0, 0);

  // LUCES REFORZADAS
  scene.add(new THREE.AmbientLight(0xffffff, 1.0));
  const sun = new THREE.DirectionalLight(0xffffff, 1.5);
  sun.position.set(5, 10, 7);
  scene.add(sun);

  const point = new THREE.PointLight(0xffffff, 0.8);
  point.position.set(-5, -5, 10);
  scene.add(point);

  // TEXTURA DE ORO
  const textureLoader = new THREE.TextureLoader();
  textureLoader.setCrossOrigin('anonymous');
  const goldTexture = textureLoader.load('image.png', (tex) => {
    tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
    tex.repeat.set(1.5, 1.5);
  });

  // --- CONTENEDOR TRANSPARENTE (La Caja) ---
  // Dimensiones del contenedor invisible
  const cWidth = 10, cHeight = 15, cDepth = 4;

  // Visual del suelo del contenedor (opcional, para referencia)
  const floorGeo = new THREE.BoxGeometry(cWidth, 0.1, cDepth);
  const floorMat = new THREE.MeshStandardMaterial({ color: 0x111111, transparent: true, opacity: 0.2 });
  const floorMesh = new THREE.Mesh(floorGeo, floorMat);
  floorMesh.position.y = -cHeight / 2;
  scene.add(floorMesh);

  // FÍSICA DE LA CAJA (Paredes estáticas invisibles)
  function createWall(w, h, d, x, y, z) {
    const shape = new CANNON.Box(new CANNON.Vec3(w/2, h/2, d/2));
    const body = new CANNON.Body({ mass: 0, material: groundMaterial }); // Mass 0 = estático
    body.addShape(shape);
    body.position.set(x, y, z);
    world.addBody(body);
  }

  createWall(cWidth, 0.1, cDepth, 0, -cHeight/2, 0); // Suelo
  createWall(0.1, cHeight, cDepth, -cWidth/2, 0, 0); // Pared Izquierda
  createWall(0.1, cHeight, cDepth, cWidth/2, 0, 0);  // Pared Derecha
  createWall(cWidth, cHeight, 0.1, 0, 0, -cDepth/2); // Pared Trasera
  createWall(cWidth, cHeight, 0.1, 0, 0, cDepth/2);  // Pared Delantera (Cierra la caja)


  // --- CREACIÓN DE FRESAS CON FÍSICA ---
  const objects = []; // Lista para sincronizar Three.js y Cannon.js
  const loader = new THREE.GLTFLoader();

  loader.load('Meshy_AI_morango_0506164222_texture.glb', (gltf) => {
    const master = gltf.scene;

    // Crear 150 fresas
    for (let i = 0; i < 150; i++) {
      const model = master.clone();
      
      // Tamaño charm variable (tamaño "uña")
      const scale = 0.2 + Math.random() * 0.3;
      model.scale.set(scale, scale, scale);

      model.traverse(n => {
        if (n.isMesh) {
          n.material = new THREE.MeshStandardMaterial({
            map: goldTexture,
            color: 0xffffff,
            metalness: 0.9,
            roughness: 0.15,
            emissive: 0x222222,
            emissiveMap: goldTexture
          });
        }
      });

      // --- CUERPO FÍSICO (CANNON.js) ---
      // Usamos una esfera como aproximación de colisión para que rueden bien
      const radius = scale * 1.5; // Ajustar radio según el modelo visual
      const shape = new CANNON.Sphere(radius);
      const body = new CANNON.Body({ 
        mass: 1, // Tienen peso
        material: slipperyMaterial,
        linearDamping: 0.1, // Resistencia del aire
        angularDamping: 0.1
      });
      body.addShape(shape);

      // Posición de inicio: Caída desde arriba dentro de la caja
      body.position.set(
        (Math.random() - 0.5) * (cWidth - radius*2),
        (cHeight / 2) + Math.random() * 10, // Por encima de la caja
        (Math.random() - 0.5) * (cDepth - radius*2)
      );
      // Rotación aleatoria inicial
      body.quaternion.setFromEuler(Math.random()*Math.PI, Math.random()*Math.PI, 0);

      world.addBody(body);
      scene.add(model);

      objects.push({ mesh: model, body: body });
    }
  });


  // --- BUCLE DE ANIMACIÓN ---
  const timeStep = 1 / 60; // Pasos de física por segundo
  let lastTime;

  function loop(time) {
    requestAnimationFrame(loop);

    if (lastTime !== undefined) {
      const dt = (time - lastTime) / 1000;
      
      // 1. Actualizar el motor de física
      world.step(timeStep, dt);

      // 2. Sincronizar visuales de Three.js con física de Cannon.js
      objects.forEach(o => {
        // Copiar posición física a la visual
        o.mesh.position.copy(o.body.position);
        // Copiar rotación física a la visual (cuaterniones)
        o.mesh.quaternion.copy(o.body.quaternion);
      });
    }
    
    // 3. Renderizar la escena
    renderer.render(scene, camera);
    lastTime = time;
  }

  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

  loop();
})();
</script>
</body>
</html>
