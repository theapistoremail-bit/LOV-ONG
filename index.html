<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LOVE – Vitrina Oro Pesado</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@900&family=Space+Mono:wght@400&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: #3a0005; /* Rojo Chocolate Profundo */
  }

  #threeCanvas {
    position: fixed;
    inset: 0;
    width: 100% !important;
    height: 100% !important;
    display: block;
    cursor: grab;
  }

  #titleContainer {
    position: fixed;
    top: 40px; left: 50%;
    transform: translateX(-50%);
    text-align: center;
    z-index: 20;
    pointer-events: none;
  }

  #title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2.5rem, 10vw, 5rem);
    letter-spacing: 0.4em;
    color: #fff;
    text-shadow: 0 10px 30px rgba(0,0,0,0.8);
  }

  #hamburger {
    position: fixed; top: 25px; left: 25px; z-index: 100;
    width: 50px; height: 50px; cursor: pointer;
    display: flex; flex-direction: column; justify-content: center;
    align-items: center; gap: 5px;
    background: rgba(0,0,0,0.5);
    border: 1px solid #d4af37;
    border-radius: 50%;
  }
  #hamburger span { display: block; width: 22px; height: 2px; background: #d4af37; }
</style>
</head>
<body>

<div id="titleContainer">
  <div id="title">L O V E</div>
</div>

<div id="hamburger">
  <span></span><span></span><span></span>
</div>

<canvas id="threeCanvas"></canvas>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

<script>
(function () {
  const canvas = document.getElementById('threeCanvas');
  const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
  renderer.setPixelRatio(window.devicePixelRatio);
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.1;

  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x3a0005);

  const camera = new THREE.PerspectiveCamera(40, window.innerWidth / window.innerHeight, 0.1, 1000);
  camera.position.z = 14;

  const BOX = { W: 0, H: 0 };
  function updateBox() {
    const fovRad = (camera.fov * Math.PI) / 180;
    BOX.H = 2 * Math.tan(fovRad / 2) * camera.position.z;
    BOX.W = BOX.H * camera.aspect;
  }

  // ILUMINACIÓN PARA TEXTURA PESADA (Menos brillo difuso, más contraste)
  const ambient = new THREE.AmbientLight(0xffeebb, 0.4);
  scene.add(ambient);

  const spot = new THREE.SpotLight(0xffffff, 2.5);
  spot.position.set(10, 20, 15);
  spot.castShadow = true;
  spot.shadow.mapSize.set(2048, 2048);
  scene.add(spot);

  // MATERIAL ORO MACIZO (Textura pesada)
  const heavyGold = new THREE.MeshStandardMaterial({
    color: 0xaa8833,     // Oro más profundo, menos amarillento
    metalness: 1.0,      // Totalmente metálico
    roughness: 0.25,     // Un poco de rugosidad para que no parezca plástico/globo
    emissive: 0x221100,
    emissiveIntensity: 0.1
  });

  const objects = [];
  const loader = new THREE.GLTFLoader();

  loader.load('Meshy_AI_morango_0506164222_texture.glb', (gltf) => {
    const source = gltf.scene;
    const NUM = 70; // Llenado masivo

    for (let i = 0; i < NUM; i++) {
      const model = source.clone();
      
      // VARIACIONES EXTRAVAGANTES
      // Algunos muy grandes, otros diminutos
      const scale = Math.random() < 0.2 ? 1.8 + Math.random() : 0.3 + Math.random() * 0.8;
      model.scale.set(scale, scale, scale);

      model.traverse(n => {
        if (n.isMesh) {
          n.material = heavyGold;
          n.castShadow = true;
          n.receiveShadow = true;
        }
      });

      // Distribución vertical hasta el tope
      model.position.set(
        (Math.random() - 0.5) * BOX.W,
        (Math.random() - 0.5) * (BOX.H * 0.9), 
        (Math.random() - 0.5) * 5
      );

      scene.add(model);
      objects.push({
        mesh: model,
        r: scale * 0.6,
        vx: (Math.random() - 0.5) * 3,
        vy: (Math.random() - 0.5) * 3,
        dragging: false
      });
    }
  });

  const FRICTION = 0.97;
  const BOUNCE = 0.6;

  function animate() {
    requestAnimationFrame(animate);
    const dt = 0.016;

    objects.forEach(o => {
      if (o.dragging) return;
      o.mesh.position.x += o.vx * dt;
      o.mesh.position.y += o.vy * dt;
      o.mesh.rotation.x += 0.005;
      o.mesh.rotation.y += 0.005;

      const limX = BOX.W / 2 - o.r;
      const limY = BOX.H / 2 - o.r;

      if (Math.abs(o.mesh.position.x) > limX) { o.vx *= -BOUNCE; o.mesh.position.x = Math.sign(o.mesh.position.x) * limX; }
      if (Math.abs(o.mesh.position.y) > limY) { o.vy *= -BOUNCE; o.mesh.position.y = Math.sign(o.mesh.position.y) * limY; }

      o.vx *= FRICTION;
      o.vy *= FRICTION;
    });

    renderer.render(scene, camera);
  }

  window.addEventListener('resize', () => {
    renderer.setSize(window.innerWidth, window.innerHeight);
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    updateBox();
  });

  updateBox();
  animate();

  // Interacción básica de arrastre
  let selected = null;
  const raycaster = new THREE.Raycaster();
  const mouse = new THREE.Vector2();

  canvas.addEventListener('mousedown', (e) => {
    mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
    raycaster.setFromCamera(mouse, camera);
    const hits = raycaster.intersectObjects(objects.map(o => o.mesh), true);
    if (hits.length > 0) {
      let root = hits[0].object;
      while (root.parent && !objects.find(o => o.mesh === root)) root = root.parent;
      selected = objects.find(o => o.mesh === root);
      if (selected) selected.dragging = true;
    }
  });

  window.addEventListener('mousemove', (e) => {
    if (!selected) return;
    mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
    const vector = new THREE.Vector3(mouse.x, mouse.y, 0.5).unproject(camera);
    const dir = vector.sub(camera.position).normalize();
    const dist = -camera.position.z / dir.z;
    const pos = camera.position.clone().add(dir.multiplyScalar(dist));
    selected.mesh.position.x = pos.x;
    selected.mesh.position.y = pos.y;
  });

  window.addEventListener('mouseup', () => { if (selected) selected.dragging = false; selected = null; });

})();
</script>
</body>
</html>
