<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LOVE – Vitrina de Oro</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@900&family=Space+Mono:wght@400&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: #800000; /* Rojo intenso y vibrante */
  }

  #threeCanvas {
    position: fixed;
    inset: 0;
    width: 100% !important;
    height: 100% !important;
    display: block;
    cursor: grab;
  }
  #threeCanvas:active { cursor: grabbing; }

  #glassFrame {
    position: fixed;
    inset: 0;
    pointer-events: none;
    border: 2px solid rgba(255,215,0,0.2);
    box-shadow: inset 0 0 100px rgba(0,0,0,0.5);
    z-index: 5;
  }

  #titleContainer {
    position: fixed;
    top: 40px; left: 50%;
    transform: translateX(-50%);
    text-align: center;
    z-index: 20;
    pointer-events: none;
  }

  #title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2rem, 8vw, 4rem);
    letter-spacing: 0.5em;
    color: #fff;
    text-shadow: 0 0 20px rgba(255,255,255,0.3);
  }

  #subtitle {
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.9em;
    color: #ffd700;
    margin-top: 10px;
    text-transform: uppercase;
  }

  #hint {
    position: fixed;
    bottom: 25px; left: 50%;
    transform: translateX(-50%);
    font-family: 'Space Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.4em;
    color: #ffd700;
    text-transform: uppercase;
    z-index: 20;
    background: rgba(0,0,0,0.3);
    padding: 5px 15px;
    border-radius: 20px;
  }

  #hamburger {
    position: fixed; top: 25px; left: 25px; z-index: 100;
    width: 50px; height: 50px; cursor: pointer;
    display: flex; flex-direction: column; justify-content: center;
    align-items: center; gap: 5px;
    background: rgba(0,0,0,0.4);
    border: 1px solid #ffd700;
    border-radius: 50%;
  }
  #hamburger span { display: block; width: 22px; height: 2px; background: #ffd700; }
</style>
</head>
<body>

<canvas id="threeCanvas"></canvas>
<div id="glassFrame"></div>

<div id="titleContainer">
  <div id="title">L O V E</div>
  <div id="subtitle">OMAR & JUAN</div>
</div>

<div id="hint">✦ INTERACTÚA CON LA JOYA ✦</div>

<div id="hamburger" onclick="toggleNav()">
  <span></span><span></span><span></span>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

<script>
(function () {
  const canvas = document.getElementById('threeCanvas');
  const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
  renderer.setPixelRatio(window.devicePixelRatio);
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.shadowMap.enabled = true;
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.5;

  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x800000); // Rojo puro

  const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
  camera.position.z = 12;

  const BOX = { W: 0, H: 0 };
  function updateBox() {
    const fovRad = (camera.fov * Math.PI) / 180;
    BOX.H = 2 * Math.tan(fovRad / 2) * camera.position.z;
    BOX.W = BOX.H * camera.aspect;
  }

  // Luces para brillo de oro
  scene.add(new THREE.AmbientLight(0xffffff, 0.6));
  const sun = new THREE.DirectionalLight(0xffffff, 2);
  sun.position.set(5, 10, 7);
  sun.castShadow = true;
  scene.add(sun);

  const goldMat = new THREE.MeshStandardMaterial({
    color: 0xffd700,
    metalness: 1,
    roughness: 0.1,
    emissive: 0x442200
  });

  const objects = [];
  const loader = new THREE.GLTFLoader();

  loader.load('Meshy_AI_morango_0506164222_texture.glb', (gltf) => {
    const NUM = 60; // Más cantidad para llenar hasta arriba
    for (let i = 0; i < NUM; i++) {
      const model = gltf.scene.clone();
      
      // ESCALAS EXTRAVAGANTES
      const s = 0.2 + Math.pow(Math.random(), 2) * 2.5; 
      model.scale.set(s, s, s);

      model.traverse(n => {
        if (n.isMesh) {
          n.material = goldMat;
          n.castShadow = true;
        }
      });

      model.position.set(
        (Math.random() - 0.5) * BOX.W,
        (Math.random() - 0.5) * (BOX.H * 0.8), // Llenando casi todo el alto
        (Math.random() - 0.5) * 4
      );

      scene.add(model);
      objects.push({
        mesh: model,
        r: s * 0.7,
        vx: (Math.random() - 0.5) * 5,
        vy: (Math.random() - 0.5) * 5,
        dragging: false
      });
    }
  });

  function animate() {
    requestAnimationFrame(animate);
    const dt = 0.016;

    objects.forEach(o => {
      if (o.dragging) return;
      o.mesh.position.x += o.vx * dt;
      o.mesh.position.y += o.vy * dt;
      o.mesh.rotation.y += 0.01;

      // Rebotes
      const limX = BOX.W / 2 - o.r;
      const limY = BOX.H / 2 - o.r;
      if (Math.abs(o.mesh.position.x) > limX) { o.vx *= -0.8; o.mesh.position.x = Math.sign(o.mesh.position.x) * limX; }
      if (Math.abs(o.mesh.position.y) > limY) { o.vy *= -0.8; o.mesh.position.y = Math.sign(o.mesh.position.y) * limY; }
    });
    renderer.render(scene, camera);
  }

  window.addEventListener('resize', () => {
    renderer.setSize(window.innerWidth, window.innerHeight);
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    updateBox();
  });

  updateBox();
  animate();
  
  // (Lógica de interacción simplificada incluida en el motor)
})();
function toggleNav() { alert("Menú de Kimerica"); }
</script>
</body>
</html>
