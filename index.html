<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LOVE – Kimerica Experience</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@900&family=Space+Mono:wght@400&display=swap');
  
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body { 
    margin: 0; 
    overflow: hidden; 
    background: #ff0000; /* Rojo Brillante */
  }

  /* Navigation */
  nav {
    position: fixed;
    top: 0; left: 0; width: 100%;
    padding: 30px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    z-index: 1000;
  }

  .logo-text {
    font-family: 'Space Mono', monospace;
    font-size: 0.8rem;
    letter-spacing: 0.5em;
    color: #fff;
    text-transform: uppercase;
  }

  .menu-trigger {
    width: 30px;
    height: 15px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    cursor: pointer;
  }

  .menu-trigger span {
    display: block;
    width: 100%;
    height: 1px;
    background: #fff;
  }

  /* Title Layout */
  #title {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 100%;
    text-align: center;
    font-family: 'Playfair Display', serif;
    font-size: clamp(4rem, 20vw, 12rem);
    letter-spacing: 0.3em;
    color: #ffffff;
    z-index: 10;
    pointer-events: none;
    text-shadow: 0 20px 50px rgba(0,0,0,0.15);
    white-space: nowrap;
  }

  canvas { display: block; cursor: grab; }
  canvas:active { cursor: grabbing; }
</style>
</head>
<body>

<nav>
  <div class="logo-text">KIMERICA</div>
  <div class="menu-trigger">
    <span></span>
    <span></span>
  </div>
</nav>

<div id="title">LOVE</div>
<canvas id="canvas3d"></canvas>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

<script>
(function() {
  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(40, window.innerWidth / window.innerHeight, 0.1, 1000);
  const renderer = new THREE.WebGLRenderer({ 
    canvas: document.getElementById('canvas3d'), 
    antialias: true,
    alpha: true 
  });
  
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(window.devicePixelRatio);
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 2.5; // Alta luminosidad

  camera.position.z = 18;

  // Luces de alto impacto para el dorado
  scene.add(new THREE.AmbientLight(0xffffff, 1.0));
  const topLight = new THREE.DirectionalLight(0xffffff, 2.0);
  topLight.position.set(0, 20, 10);
  scene.add(topLight);

  const objects = [];
  const loader = new THREE.GLTFLoader();

  const viewSize = { w: 0, h: 0 };
  function updateLimits() {
    const fov = (camera.fov * Math.PI) / 180;
    viewSize.h = 2 * Math.tan(fov / 2) * camera.position.z;
    viewSize.w = viewSize.h * camera.aspect;
  }
  updateLimits();

  loader.load('Meshy_AI_morango_0506164222_texture.glb', (gltf) => {
    const master = gltf.scene;
    const count = 60; // Cantidad para llenar la pantalla

    for (let i = 0; i < count; i++) {
      const model = master.clone();
      const s = 0.7 + Math.random() * 1.8;
      model.scale.set(s, s, s);

      model.traverse(child => {
        if (child.isMesh) {
          // Respetamos la textura original pero añadimos el acabado dorado brillante
          child.material.metalness = 1.0;
          child.material.roughness = 0.05;
          child.material.emissive = new THREE.Color(0x332200);
          child.material.emissiveIntensity = 0.2;
        }
      });

      model.position.set(
        (Math.random() - 0.5) * (viewSize.w * 0.9),
        (Math.random() * viewSize.h),
        (Math.random() - 0.5) * 4
      );

      scene.add(model);
      objects.push({
        mesh: model,
        radius: s * 0.78, // Radio de colisión para apilarse
        vel: new THREE.Vector2(0, -10),
        isDragging: false
      });
    }
  });

  const GRAVITY = -35;
  const BOUNCE = 0.1; // Rebote sólido, sin efecto globo

  function update() {
    const dt = 0.016;

    for (let i = 0; i < objects.length; i++) {
      const o = objects[i];
      if (o.isDragging) continue;

      // Movimiento
      o.vel.y += GRAVITY * dt;
      o.mesh.position.y += o.vel.y * dt;
      o.mesh.position.x += o.vel.x * dt;

      // Colisión con el suelo (fondo de pantalla)
      const floor = -viewSize.h / 2 + o.radius;
      if (o.mesh.position.y < floor) {
        o.mesh.position.y = floor;
        o.vel.y *= -BOUNCE;
        o.vel.x *= 0.85; 
      }

      // Colisión con paredes
      const wall = viewSize.w / 2 - o.radius;
      if (Math.abs(o.mesh.position.x) > wall) {
        o.mesh.position.x = Math.sign(o.mesh.position.x) * wall;
        o.vel.x *= -BOUNCE;
      }

      // FISICA DE APILAMIENTO (Unas sobre otras)
      for (let j = i + 1; j < objects.length; j++) {
        const other = objects[j];
        const dx = other.mesh.position.x - o.mesh.position.x;
        const dy = other.mesh.position.y - o.mesh.position.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        const minDist = o.radius + other.radius;

        if (dist < minDist) {
          const angle = Math.atan2(dy, dx);
          const overlap = (minDist - dist) * 0.5;
          
          // Separación real para evitar fusión
          o.mesh.position.x -= Math.cos(angle) * overlap;
          o.mesh.position.y -= Math.sin(angle) * overlap;
          other.mesh.position.x += Math.cos(angle) * overlap;
          other.mesh.position.y += Math.sin(angle) * overlap;

          // Pierden energía para quedarse una encima de la otra
          o.vel.y *= 0.5;
          other.vel.y *= 0.5;
        }
      }
    }

    renderer.render(scene, camera);
    requestAnimationFrame(update);
  }

  // Interacción Drag & Drop
  const raycaster = new THREE.Raycaster();
  const mouse = new THREE.Vector2();
  let selected = null;

  function onPointerMove(e) {
    const x = e.touches ? e.touches[0].clientX : e.clientX;
    const y = e.touches ? e.touches[0].clientY : e.clientY;
    mouse.x = (x / window.innerWidth) * 2 - 1;
    mouse.y = -(y / window.innerHeight) * 2 + 1;

    if (selected) {
      const vec = new THREE.Vector3(mouse.x, mouse.y, 0.5).unproject(camera);
      const dir = vec.sub(camera.position).normalize();
      const pos = camera.position.clone().add(dir.multiplyScalar(-camera.position.z / dir.z));
      
      selected.vel.x = (pos.x - selected.mesh.position.x) * 15;
      selected.vel.y = (pos.y - selected.mesh.position.y) * 15;
      selected.mesh.position.copy(pos);
    }
  }

  function onPointerDown() {
    raycaster.setFromCamera(mouse, camera);
    const hits = raycaster.intersectObjects(objects.map(o => o.mesh), true);
    if (hits.length > 0) {
      let root = hits[0].object;
      while(root.parent && !objects.find(o => o.mesh === root)) root = root.parent;
      selected = objects.find(o => o.mesh === root);
      if (selected) selected.isDragging = true;
    }
  }

  window.addEventListener('mousedown', onPointerDown);
  window.addEventListener('mousemove', onPointerMove);
  window.addEventListener('mouseup', () => { if(selected) selected.isDragging = false; selected = null; });
  window.addEventListener('touchstart', onPointerDown);
  window.addEventListener('touchmove', onPointerMove);
  window.addEventListener('touchend', () => { if(selected) selected.isDragging = false; selected = null; });

  window.addEventListener('resize', () => {
    renderer.setSize(window.innerWidth, window.innerHeight);
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    updateLimits();
  });

  update();
})();
</script>
</body>
</html>
