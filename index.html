<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KIMERICA – ULTRA GOLD</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@900&family=Space+Mono:wght@400&display=swap');
  
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  
  body { 
    margin: 0; 
    overflow: hidden; 
    background-color: #ff0000; /* Fondo Rojo Vibrante */
  }

  /* NAVEGACIÓN */
  nav {
    position: fixed;
    top: 0; left: 0; width: 100%;
    padding: 30px 40px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    z-index: 5000;
  }

  .brand {
    font-family: 'Space Mono', monospace;
    font-size: 0.9rem;
    letter-spacing: 0.6em;
    color: #ffffff;
    text-transform: uppercase;
    text-decoration: none;
  }

  .menu-btn {
    width: 30px; height: 20px;
    display: flex; flex-direction: column;
    justify-content: space-between;
    cursor: pointer;
  }

  .menu-btn span {
    display: block; width: 100%; height: 2px;
    background: #ffffff; transition: 0.3s;
  }

  .menu-btn.active span:nth-child(1) { transform: translateY(9px) rotate(45deg); }
  .menu-btn.active span:nth-child(2) { opacity: 0; }
  .menu-btn.active span:nth-child(3) { transform: translateY(-9px) rotate(-45deg); }

  /* TÍTULO LOVE */
  #title-container {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    display: flex; justify-content: center; align-items: center;
    z-index: 100; pointer-events: none;
  }

  #title-container h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(5rem, 28vw, 20rem);
    color: #ffffff;
    font-weight: 900;
  }

  #canvas3d {
    position: absolute;
    top: 0; left: 0;
    z-index: 1000;
    cursor: grab;
  }
</style>
</head>
<body>

<nav>
  <a href="#" class="brand">KIMERICA</a>
  <div class="menu-btn" id="burger">
    <span></span>
    <span></span>
    <span></span>
  </div>
</nav>

<div id="title-container">
  <h1>LOVE</h1>
</div>

<canvas id="canvas3d"></canvas>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/cannon.js/0.6.2/cannon.min.js"></script>

<script>
(function() {
  const burger = document.getElementById('burger');
  burger.onclick = () => burger.classList.toggle('active');

  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(35, window.innerWidth / window.innerHeight, 0.1, 1000);
  const renderer = new THREE.WebGLRenderer({ 
    canvas: document.getElementById('canvas3d'), 
    antialias: true, 
    alpha: true 
  });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(window.devicePixelRatio);
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.5;

  camera.position.set(0, 0, 22);

  // LUCES DE JOYERÍA
  const ambient = new THREE.AmbientLight(0xffffff, 0.8);
  scene.add(ambient);

  const mainLight = new THREE.SpotLight(0xffffff, 2);
  mainLight.position.set(10, 20, 20);
  scene.add(mainLight);

  const backLight = new THREE.PointLight(0xffd700, 2); // Luz dorada trasera
  backLight.position.set(-10, -10, 5);
  scene.add(backLight);

  // FÍSICA
  const world = new CANNON.World();
  world.gravity.set(0, -18, 0);

  // CONTENEDOR
  function createWall(w, h, d, x, y, z) {
    const body = new CANNON.Body({ mass: 0 });
    body.addShape(new CANNON.Box(new CANNON.Vec3(w/2, h/2, d/2)));
    body.position.set(x, y, z);
    world.addBody(body);
  }
  createWall(20, 1, 10, 0, -9.5, 0); // Suelo
  createWall(1, 40, 10, -8.5, 0, 0); // Izq
  createWall(1, 40, 10, 8.5, 0, 0);  // Der

  // CARGA DE TEXTURA PROPORCIONADA
  const textureLoader = new THREE.TextureLoader();
  const goldTexture = textureLoader.load('image.png');
  goldTexture.wrapS = goldTexture.wrapT = THREE.RepeatWrapping;
  goldTexture.anisotropy = 16;

  const objects = [];
  const loader = new THREE.GLTFLoader();

  loader.load('Meshy_AI_morango_0506164222_texture.glb', (gltf) => {
    const master = gltf.scene;

    for (let i = 0; i < 80; i++) {
      const model = master.clone();
      const s = 0.3 + Math.random() * 0.5;
      model.scale.set(s, s, s);

      model.traverse(n => {
        if (n.isMesh) {
          n.material = new THREE.MeshPhysicalMaterial({
            map: goldTexture,
            bumpMap: goldTexture, // Tu imagen crea el relieve de los poros
            bumpScale: 0.05,
            metalness: 1.0,      // Oro puro
            roughness: 0.15,     // Brillo de pulido
            clearcoat: 1.0,      // Capa de barniz extra
            clearcoatRoughness: 0.05,
            color: 0xffe082      // Tinte oro brillante
          });
        }
      });

      const body = new CANNON.Body({ mass: 1 });
      body.addShape(new CANNON.Sphere(s * 1.4));
      body.position.set((Math.random()-0.5)*14, 15 + i*2, (Math.random()-0.5)*2);
      
      world.addBody(body);
      scene.add(model);
      objects.push({ mesh: model, body: body });
    }
  });

  // INTERACCIÓN POR ARRASTRE
  const raycaster = new THREE.Raycaster();
  const mouse = new THREE.Vector2();
  let selected = null;

  function getPos(e) {
    const x = e.touches ? e.touches[0].clientX : e.clientX;
    const y = e.touches ? e.touches[0].clientY : e.clientY;
    mouse.x = (x / window.innerWidth) * 2 - 1;
    mouse.y = -(y / window.innerHeight) * 2 + 1;
    raycaster.setFromCamera(mouse, camera);
  }

  window.addEventListener('mousedown', (e) => {
    getPos(e);
    const hits = raycaster.intersectObjects(scene.children, true);
    if (hits.length > 0) {
      let root = hits[0].object;
      while(root.parent && !objects.find(o => o.mesh === root)) root = root.parent;
      selected = objects.find(o => o.mesh === root);
      if(selected) selected.body.mass = 0;
    }
  });

  window.addEventListener('mousemove', (e) => {
    if (!selected) return;
    getPos(e);
    const vector = new THREE.Vector3(mouse.x, mouse.y, 0.5).unproject(camera);
    const dir = vector.sub(camera.position).normalize();
    const dist = -camera.position.z / dir.z;
    const pos = camera.position.clone().add(dir.multiplyScalar(dist));
    selected.body.position.set(pos.x, pos.y, 0);
  });

  window.addEventListener('mouseup', () => {
    if (selected) selected.body.mass = 1;
    selected = null;
  });

  function loop() {
    world.step(1/60);
    objects.forEach(o => {
      o.mesh.position.copy(o.body.position);
      o.mesh.quaternion.copy(o.body.quaternion);
    });
    renderer.render(scene, camera);
    requestAnimationFrame(loop);
  }

  loop();
})();
</script>
</body>
</html>
