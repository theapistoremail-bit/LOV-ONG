<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LOVE – Vitrina Pesada</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@900&family=Space+Mono:wght@400&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: #2b0003; /* Chocolate rojizo muy oscuro */
  }

  #threeCanvas {
    position: fixed;
    inset: 0;
    width: 100% !important;
    height: 100% !important;
    display: block;
    cursor: grab;
  }

  #titleContainer {
    position: fixed;
    top: 45px; left: 50%;
    transform: translateX(-50%);
    text-align: center;
    z-index: 20;
    pointer-events: none;
  }

  #title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2.5rem, 10vw, 5.5rem);
    letter-spacing: 0.5em;
    color: #fff;
    text-shadow: 0 10px 40px rgba(0,0,0,0.9);
  }

  #subtitle {
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.8em;
    color: #d4af37;
    margin-top: 15px;
    text-transform: uppercase;
  }

  #hamburger {
    position: fixed; top: 25px; left: 25px; z-index: 100;
    width: 55px; height: 55px; cursor: pointer;
    display: flex; flex-direction: column; justify-content: center;
    align-items: center; gap: 6px;
    background: rgba(0,0,0,0.7);
    border: 1px solid #d4af37;
    border-radius: 50%;
  }
  #hamburger span { display: block; width: 24px; height: 2px; background: #d4af37; }
</style>
</head>
<body>

<canvas id="threeCanvas"></canvas>

<div id="titleContainer">
  <div id="title">L O V E</div>
  <div id="subtitle">NUESTRAS RAÍCES, NUESTRO FUTURO</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

<script>
(function () {
  const canvas = document.getElementById('threeCanvas');
  const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
  renderer.setPixelRatio(window.devicePixelRatio);
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.shadowMap.enabled = true;
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.4;

  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x2b0003);

  const camera = new THREE.PerspectiveCamera(40, window.innerWidth / window.innerHeight, 0.1, 1000);
  camera.position.z = 15;

  const BOX = { W: 0, H: 0 };
  function updateBox() {
    const fovRad = (camera.fov * Math.PI) / 180;
    BOX.H = 2 * Math.tan(fovRad / 2) * camera.position.z;
    BOX.W = BOX.H * camera.aspect;
  }

  // Luces intensas para sacar brillo a la textura original
  scene.add(new THREE.AmbientLight(0xffffff, 0.6));
  const light = new THREE.SpotLight(0xffffff, 3);
  light.position.set(10, 20, 10);
  light.castShadow = true;
  scene.add(light);

  const objects = [];
  const loader = new THREE.GLTFLoader();

  loader.load('Meshy_AI_morango_0506164222_texture.glb', (gltf) => {
    const source = gltf.scene;
    const NUM = 55; 

    for (let i = 0; i < NUM; i++) {
      const model = source.clone();
      
      // Variación extravagante de tamaños
      const scale = Math.random() < 0.15 ? 2.2 : 0.4 + Math.random() * 0.9;
      model.scale.set(scale, scale, scale);

      model.traverse(n => {
        if (n.isMesh) {
          n.castShadow = true;
          // Respetamos la textura original pero inyectamos brillo metálico
          n.material.metalness = 0.8;
          n.material.roughness = 0.2;
        }
      });

      // Aparecen arriba para caer con peso
      model.position.set(
        (Math.random() - 0.5) * BOX.W,
        (Math.random() * BOX.H), 
        (Math.random() - 0.5) * 4
      );

      scene.add(model);
      objects.push({
        mesh: model,
        r: scale * 0.7,
        vx: (Math.random() - 0.5) * 2,
        vy: -5, // Inician cayendo
        dragging: false
      });
    }
  });

  // FÍSICA DE PESO (Gravedad alta, poco rebote)
  const GRAVITY = -25; 
  const FRICTION = 0.95;
  const BOUNCE = 0.3; // Rebote seco, pesado

  function animate() {
    requestAnimationFrame(animate);
    const dt = 0.016;

    objects.forEach(o => {
      if (o.dragging) return;

      o.vy += GRAVITY * dt;
      o.mesh.position.x += o.vx * dt;
      o.mesh.position.y += o.vy * dt;

      // Colisión con el "suelo" de la pantalla
      const limY = -BOX.H / 2 + o.r;
      const limX = BOX.W / 2 - o.r;

      if (o.mesh.position.y < limY) {
        o.mesh.position.y = limY;
        o.vy *= -BOUNCE;
        o.vx *= 0.8; // Fricción al tocar suelo
      }

      if (Math.abs(o.mesh.position.x) > limX) {
        o.mesh.position.x = Math.sign(o.mesh.position.x) * limX;
        o.vx *= -BOUNCE;
      }

      // Rotación inercial
      o.mesh.rotation.x += o.vx * 0.05;
      o.mesh.rotation.z += o.vy * 0.01;
    });

    renderer.render(scene, camera);
  }

  window.addEventListener('resize', () => {
    renderer.setSize(window.innerWidth, window.innerHeight);
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    updateBox();
  });

  updateBox();
  animate();

  // Interacción táctil/mouse
  let selected = null;
  const raycaster = new THREE.Raycaster();
  const mouse = new THREE.Vector2();

  canvas.addEventListener('mousedown', (e) => {
    mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
    raycaster.setFromCamera(mouse, camera);
    const hits = raycaster.intersectObjects(objects.map(o => o.mesh), true);
    if (hits.length > 0) {
      let root = hits[0].object;
      while (root.parent && !objects.find(o => o.mesh === root)) root = root.parent;
      selected = objects.find(o => o.mesh === root);
      if (selected) {
        selected.dragging = true;
        selected.vy = 0;
      }
    }
  });

  window.addEventListener('mousemove', (e) => {
    if (!selected) return;
    mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
    const vector = new THREE.Vector3(mouse.x, mouse.y, 0.5).unproject(camera);
    const dir = vector.sub(camera.position).normalize();
    const dist = -camera.position.z / dir.z;
    const pos = camera.position.clone().add(dir.multiplyScalar(dist));
    selected.vx = (pos.x - selected.mesh.position.x) * 15;
    selected.vy = (pos.y - selected.mesh.position.y) * 15;
    selected.mesh.position.x = pos.x;
    selected.mesh.position.y = pos.y;
  });

  window.addEventListener('mouseup', () => { if (selected) selected.dragging = false; selected = null; });
})();
</script>
</body>
</html>
