<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KIMERICA – LOVE</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@900&family=Space+Mono:wght@400&display=swap');
  
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  
  body { 
    margin: 0; 
    overflow: hidden; 
    background-color: #ff0000; /* ROJO PURO */
  }

  /* NAVEGACIÓN */
  nav {
    position: fixed;
    top: 0; left: 0; width: 100%;
    padding: 30px 40px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    z-index: 5000;
  }

  .brand {
    font-family: 'Space Mono', monospace;
    font-size: 0.9rem;
    letter-spacing: 0.6em;
    color: #ffffff;
    text-transform: uppercase;
    text-decoration: none;
  }

  .menu-btn {
    width: 30px;
    height: 20px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    cursor: pointer;
  }

  .menu-btn span {
    display: block;
    width: 100%;
    height: 2px;
    background: #ffffff;
    transition: 0.3s;
  }

  .menu-btn.active span:nth-child(1) { transform: translateY(9px) rotate(45deg); }
  .menu-btn.active span:nth-child(2) { opacity: 0; }
  .menu-btn.active span:nth-child(3) { transform: translateY(-9px) rotate(-45deg); }

  /* TÍTULO */
  #title-container {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 100;
    pointer-events: none;
  }

  #title-container h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(5rem, 25vw, 18rem);
    color: #ffffff;
    font-weight: 900;
  }

  #canvas3d {
    position: absolute;
    top: 0; left: 0;
    z-index: 1000;
    cursor: grab;
  }
  #canvas3d:active { cursor: grabbing; }
</style>
</head>
<body>

<nav>
  <a href="#" class="brand">KIMERICA</a>
  <div class="menu-btn" id="burger">
    <span></span>
    <span></span>
    <span></span>
  </div>
</nav>

<div id="title-container">
  <h1>LOVE</h1>
</div>

<canvas id="canvas3d"></canvas>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/cannon.js/0.6.2/cannon.min.js"></script>

<script>
(function() {
  // NAVBAR
  const burger = document.getElementById('burger');
  burger.onclick = () => burger.classList.toggle('active');

  // ESCENA
  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(35, window.innerWidth / window.innerHeight, 0.1, 1000);
  const renderer = new THREE.WebGLRenderer({ 
    canvas: document.getElementById('canvas3d'), 
    antialias: true, 
    alpha: true 
  });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(window.devicePixelRatio);
  camera.position.set(0, 0, 22);

  // LUZ MASIVA (Para que se vea la textura sí o sí)
  const hemiLight = new THREE.HemisphereLight(0xffffff, 0xffffff, 1.5);
  scene.add(hemiLight);

  const directLight = new THREE.DirectionalLight(0xffffff, 2);
  directLight.position.set(0, 10, 10);
  scene.add(directLight);

  // FÍSICA
  const world = new CANNON.World();
  world.gravity.set(0, -15, 0);

  // CAJA INVISIBLE
  const cW = 16, cH = 25;
  function createWall(w, h, d, x, y, z) {
    const body = new CANNON.Body({ mass: 0 });
    body.addShape(new CANNON.Box(new CANNON.Vec3(w/2, h/2, d/2)));
    body.position.set(x, y, z);
    world.addBody(body);
  }
  createWall(20, 1, 10, 0, -10, 0); // Suelo
  createWall(1, 40, 10, -8, 0, 0); // Pared Izq
  createWall(1, 40, 10, 8, 0, 0);  // Pared Der
  createWall(20, 40, 1, 0, 0, -2); // Fondo

  // TEXTURA
  const textureLoader = new THREE.TextureLoader();
  const goldTexture = textureLoader.load('image.png');

  const objects = [];
  const loader = new THREE.GLTFLoader();

  loader.load('Meshy_AI_morango_0506164222_texture.glb', (gltf) => {
    const master = gltf.scene;

    for (let i = 0; i < 100; i++) {
      const model = master.clone();
      const s = 0.25 + Math.random() * 0.4;
      model.scale.set(s, s, s);

      model.traverse(n => {
        if (n.isMesh) {
          n.material = new THREE.MeshBasicMaterial({ // Basic ignora sombras, SE VERÁ SI O SI
            map: goldTexture,
            color: 0xffffff
          });
        }
      });

      const body = new CANNON.Body({ mass: 1 });
      body.addShape(new CANNON.Sphere(s * 1.5));
      body.position.set((Math.random()-0.5)*10, 10 + i, 0);
      
      world.addBody(body);
      scene.add(model);
      objects.push({ mesh: model, body: body });
    }
  });

  // INTERACCIÓN (Raycaster para moverlos)
  const raycaster = new THREE.Raycaster();
  const mouse = new THREE.Vector2();
  let draggedObj = null;

  function updateMouse(e) {
    const x = e.touches ? e.touches[0].clientX : e.clientX;
    const y = e.touches ? e.touches[0].clientY : e.clientY;
    mouse.x = (x / window.innerWidth) * 2 - 1;
    mouse.y = -(y / window.innerHeight) * 2 + 1;
  }

  window.addEventListener('mousedown', (e) => {
    updateMouse(e);
    raycaster.setFromCamera(mouse, camera);
    const intersects = raycaster.intersectObjects(scene.children, true);
    if (intersects.length > 0) {
      let clicked = intersects[0].object;
      while(clicked.parent && !objects.find(o => o.mesh === clicked)) clicked = clicked.parent;
      draggedObj = objects.find(o => o.mesh === clicked);
      if(draggedObj) draggedObj.body.mass = 0; // Hacerlo estático mientras se arrastra
    }
  });

  window.addEventListener('mousemove', (e) => {
    if (!draggedObj) return;
    updateMouse(e);
    const vector = new THREE.Vector3(mouse.x, mouse.y, 0.5).unproject(camera);
    const dir = vector.sub(camera.position).normalize();
    const distance = -camera.position.z / dir.z;
    const pos = camera.position.clone().add(dir.multiplyScalar(distance));
    draggedObj.body.position.set(pos.x, pos.y, 0);
    draggedObj.body.velocity.set(0,0,0);
  });

  window.addEventListener('mouseup', () => {
    if (draggedObj) draggedObj.body.mass = 1;
    draggedObj = null;
  });

  // SOPORTE TOUCH
  window.addEventListener('touchstart', (e) => { updateMouse(e); /* misma logica mousedown */ }, {passive: false});
  window.addEventListener('touchmove', (e) => { if(draggedObj) e.preventDefault(); /* misma logica mousemove */ }, {passive: false});

  function loop() {
    world.step(1/60);
    objects.forEach(o => {
      o.mesh.position.copy(o.body.position);
      o.mesh.quaternion.copy(o.body.quaternion);
    });
    renderer.render(scene, camera);
    requestAnimationFrame(loop);
  }

  window.onresize = () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  };

  loop();
})();
</script>
</body>
</html>
