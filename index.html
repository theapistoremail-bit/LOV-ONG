<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LOVE – Vitrina Filantrópica</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@900&family=Space+Mono:wght@400&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: #3d0005; /* Rojo chocolate profundo */
  }

  #threeCanvas {
    position: fixed;
    inset: 0;
    width: 100% !important;
    height: 100% !important;
    display: block;
    cursor: grab;
  }
  #threeCanvas:active { cursor: grabbing; }

  #titleContainer {
    position: fixed;
    top: 40px; left: 50%;
    transform: translateX(-50%);
    text-align: center;
    z-index: 20;
    pointer-events: none;
  }

  #title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2.5rem, 10vw, 5.5rem);
    letter-spacing: 0.5em;
    color: #fff;
    text-shadow: 0 10px 40px rgba(0,0,0,0.9);
  }

  #subtitle {
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.8em;
    color: #ffd700;
    margin-top: 15px;
    text-transform: uppercase;
    font-weight: bold;
  }

  #hint {
    position: fixed;
    bottom: 30px; left: 50%;
    transform: translateX(-50%);
    font-family: 'Space Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.4em;
    color: #ffd700;
    text-transform: uppercase;
    z-index: 20;
    background: rgba(0,0,0,0.5);
    padding: 8px 20px;
    border-radius: 30px;
    border: 1px solid rgba(255,215,0,0.3);
  }

  #hamburger {
    position: fixed; top: 25px; left: 25px; z-index: 100;
    width: 55px; height: 55px; cursor: pointer;
    display: flex; flex-direction: column; justify-content: center;
    align-items: center; gap: 6px;
    background: rgba(0,0,0,0.6);
    border: 2px solid #ffd700;
    border-radius: 50%;
    transition: 0.3s;
  }
  #hamburger span { display: block; width: 24px; height: 2px; background: #ffd700; }
</style>
</head>
<body>

<canvas id="threeCanvas"></canvas>

<div id="titleContainer">
  <div id="title">L O V E</div>
  <div id="subtitle">EMPOWERING COMMUNITIES</div>
</div>

<div id="hint">✦ APRENDA SOBRE NUESTRAS INICIATIVAS ✦</div>

<div id="hamburger">
  <span></span><span></span><span></span>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

<script>
(function () {
  const canvas = document.getElementById('threeCanvas');
  const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
  renderer.setPixelRatio(window.devicePixelRatio);
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.3;

  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x3d0005);

  const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
  camera.position.z = 13;

  const BOX = { W: 0, H: 0 };
  function updateBoxSize() {
    const fovRad = (camera.fov * Math.PI) / 180;
    BOX.H = 2 * Math.tan(fovRad / 2) * camera.position.z;
    BOX.W = BOX.H * camera.aspect;
  }

  // Luz de estudio para resaltar la malla de oro
  scene.add(new THREE.AmbientLight(0xffffff, 0.5));
  const light1 = new THREE.PointLight(0xffffff, 2, 50);
  light1.position.set(10, 10, 10);
  scene.add(light1);
  const light2 = new THREE.DirectionalLight(0xffd700, 1.5);
  light2.position.set(-10, 5, 5);
  scene.add(light2);

  // MATERIAL ORO MACIZO (No globo)
  const heavyGoldMat = new THREE.MeshStandardMaterial({
    color: 0xd4af37, // Oro metálico clásico
    metalness: 1.0,
    roughness: 0.2,  // Evita el efecto plástico/globo
    emissive: 0x221100,
    emissiveIntensity: 0.1
  });

  const objects = [];
  const loader = new THREE.GLTFLoader();

  // Cargamos TU malla de fresa
  loader.load('Meshy_AI_morango_0506164222_texture.glb', (gltf) => {
    const source = gltf.scene;
    const TOTAL = 65; // Llenado masivo

    for (let i = 0; i < TOTAL; i++) {
      const model = source.clone();
      
      // Variación de tamaño extravagante
      const scaleBase = Math.random();
      const scale = scaleBase > 0.8 ? 1.8 + Math.random() : 0.4 + Math.random() * 0.7;
      model.scale.set(scale, scale, scale);

      model.traverse(n => {
        if (n.isMesh) {
          n.material = heavyGoldMat;
          n.castShadow = true;
          n.receiveShadow = true;
        }
      });

      // Posicionamiento hasta el tope
      model.position.set(
        (Math.random() - 0.5) * BOX.W,
        (Math.random() - 0.5) * (BOX.H * 0.85), 
        (Math.random() - 0.5) * 4
      );

      scene.add(model);
      objects.push({
        mesh: model,
        r: scale * 0.7,
        vx: (Math.random() - 0.5) * 4,
        vy: (Math.random() - 0.5) * 4,
        dragging: false
      });
    }
  });

  const FRICTION = 0.98;
  const BOUNCE = 0.6;

  function animate() {
    requestAnimationFrame(animate);
    const dt = 0.016;

    objects.forEach(o => {
      if (o.dragging) return;
      o.mesh.position.x += o.vx * dt;
      o.mesh.position.y += o.vy * dt;
      
      // Rotación lenta y pesada
      o.mesh.rotation.x += 0.006;
      o.mesh.rotation.z += 0.004;

      const limX = BOX.W / 2 - o.r;
      const limY = BOX.H / 2 - o.r;

      if (Math.abs(o.mesh.position.x) > limX) { 
        o.vx *= -BOUNCE; 
        o.mesh.position.x = Math.sign(o.mesh.position.x) * limX; 
      }
      if (Math.abs(o.mesh.position.y) > limY) { 
        o.vy *= -BOUNCE; 
        o.mesh.position.y = Math.sign(o.mesh.position.y) * limY; 
      }

      o.vx *= FRICTION;
      o.vy *= FRICTION;
    });

    renderer.render(scene, camera);
  }

  // Interacción de arrastre
  let dragObj = null;
  const raycaster = new THREE.Raycaster();
  const mouse = new THREE.Vector2();

  canvas.addEventListener('mousedown', (e) => {
    mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
    raycaster.setFromCamera(mouse, camera);
    const hits = raycaster.intersectObjects(objects.map(o => o.mesh), true);
    if (hits.length > 0) {
      let root = hits[0].object;
      while (root.parent && !objects.find(o => o.mesh === root)) root = root.parent;
      dragObj = objects.find(o => o.mesh === root);
      if (dragObj) dragObj.dragging = true;
    }
  });

  window.addEventListener('mousemove', (e) => {
    if (!dragObj) return;
    mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
    const vector = new THREE.Vector3(mouse.x, mouse.y, 0.5).unproject(camera);
    const dir = vector.sub(camera.position).normalize();
    const dist = -camera.position.z / dir.z;
    const pos = camera.position.clone().add(dir.multiplyScalar(dist));
    dragObj.mesh.position.x = pos.x;
    dragObj.mesh.position.y = pos.y;
    dragObj.vx = 0; dragObj.vy = 0;
  });

  window.addEventListener('mouseup', () => { if (dragObj) dragObj.dragging = false; dragObj = null; });

  window.addEventListener('resize', () => {
    renderer.setSize(window.innerWidth, window.innerHeight);
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    updateBoxSize();
  });

  updateBoxSize();
  animate();
})();
</script>
</body>
</html>
