<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LOVE – Vitrina de Sólidos Áureos</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@900&family=Space+Mono:wght@400&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #1a0000; }
  #threeCanvas { position: fixed; inset: 0; width: 100% !important; height: 100% !important; display: block; cursor: grab; }
  #titleContainer { position: fixed; top: 40px; left: 50%; transform: translateX(-50%); text-align: center; z-index: 20; pointer-events: none; }
  #title { font-family: 'Playfair Display', serif; font-size: clamp(3rem, 12vw, 6rem); letter-spacing: 0.3em; color: #ffffff; text-shadow: 0 10px 30px rgba(0,0,0,0.8); }
  #subtitle { font-family: 'Space Mono', monospace; font-size: 0.75rem; letter-spacing: 0.5em; color: #b8860b; margin-top: 5px; text-transform: uppercase; }
</style>
</head>
<body>

<div id="titleContainer">
  <div id="title">L O V E</div>
  <div id="subtitle">FILANTROPÍA Y LEGADO</div>
</div>

<canvas id="threeCanvas"></canvas>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

<script>
(function () {
  const canvas = document.getElementById('threeCanvas');
  const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
  renderer.setPixelRatio(window.devicePixelRatio);
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.shadowMap.enabled = true;
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.4;

  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x1a0000);

  const camera = new THREE.PerspectiveCamera(40, window.innerWidth / window.innerHeight, 0.1, 1000);
  camera.position.z = 15;

  const BOX = { W: 0, H: 0 };
  function updateBox() {
    const fovRad = (camera.fov * Math.PI) / 180;
    BOX.H = 2 * Math.tan(fovRad / 2) * camera.position.z;
    BOX.W = BOX.H * camera.aspect;
  }

  // Iluminación cálida para el dorado profundo
  scene.add(new THREE.AmbientLight(0xffffff, 0.4));
  const light1 = new THREE.DirectionalLight(0xffeebb, 1.5);
  light1.position.set(5, 10, 7);
  scene.add(light1);

  const objects = [];
  const loader = new THREE.GLTFLoader();

  loader.load('Meshy_AI_morango_0506164222_texture.glb', (gltf) => {
    const source = gltf.scene;
    const TOTAL = 40; 

    for (let i = 0; i < TOTAL; i++) {
      const model = source.clone();
      const s = 0.6 + Math.random() * 1.6;
      model.scale.set(s, s, s);

      model.traverse(n => {
        if (n.isMesh) {
          n.castShadow = true;
          // Ajuste de Dorado Profundo (Menos amarillo, más ocre/bronce)
          n.material.color.setHex(0xc5a059); 
          n.material.metalness = 1.0;
          n.material.roughness = 0.2;
          n.material.emissive.setHex(0x221100);
          n.material.emissiveIntensity = 0.2;
        }
      });

      model.position.set(
        (Math.random() - 0.5) * (BOX.W * 0.7),
        (Math.random() * BOX.H), 
        (Math.random() - 0.5) * 2
      );

      scene.add(model);
      objects.push({
        mesh: model,
        r: s * 0.75, // Radio físico de colisión
        v: new THREE.Vector3(0, -10, 0),
        mass: s,
        dragging: false
      });
    }
  });

  const GRAVITY = -35; 
  const BOUNCE = 0.15; // Rebote sutil metálico

  function animate() {
    requestAnimationFrame(animate);
    const dt = 0.016;

    // Físicas y Colisión con bordes
    objects.forEach(o => {
      if (o.dragging) return;

      o.v.y += GRAVITY * dt;
      o.mesh.position.addScaledVector(o.v, dt);

      const floor = -BOX.H / 2 + o.r;
      const wall = BOX.W / 2 - o.r;

      if (o.mesh.position.y < floor) {
        o.mesh.position.y = floor;
        o.v.y *= -BOUNCE;
        o.v.x *= 0.7; // Fricción
      }
      if (Math.abs(o.mesh.position.x) > wall) {
        o.mesh.position.x = Math.sign(o.mesh.position.x) * wall;
        o.v.x *= -BOUNCE;
      }
    });

    // SISTEMA DE COLISIÓN ENTRE OBJETOS (Resolución de Solidez)
    for (let i = 0; i < objects.length; i++) {
      for (let j = i + 1; j < objects.length; j++) {
        const a = objects[i];
        const b = objects[j];
        
        const diff = b.mesh.position.clone().sub(a.mesh.position);
        const distance = diff.length();
        const minDist = a.r + b.r;

        if (distance < minDist) {
          // 1. Separación física inmediata (evita fusión)
          const overlap = minDist - distance;
          const normal = diff.normalize();
          const separation = normal.clone().multiplyScalar(overlap * 0.5);
          
          a.mesh.position.sub(separation);
          b.mesh.position.add(separation);

          // 2. Respuesta de impulso (rebote sólido)
          const relativeVelocity = b.v.clone().sub(a.v);
          const velocityAlongNormal = relativeVelocity.dot(normal);

          if (velocityAlongNormal < 0) {
            const impulse = -(1 + BOUNCE) * velocityAlongNormal;
            const impulseVec = normal.multiplyScalar(impulse * 0.5);
            a.v.sub(impulseVec);
            b.v.add(impulseVec);
          }
        }
      }
    }

    renderer.render(scene, camera);
  }

  // Interacción (Grabbing)
  let selected = null;
  const raycaster = new THREE.Raycaster();
  const mouse = new THREE.Vector2();

  function onDown(e) {
    const x = e.touches ? e.touches[0].clientX : e.clientX;
    const y = e.touches ? e.touches[0].clientY : e.clientY;
    mouse.x = (x / window.innerWidth) * 2 - 1;
    mouse.y = -(y / window.innerHeight) * 2 + 1;
    raycaster.setFromCamera(mouse, camera);
    const hits = raycaster.intersectObjects(objects.map(o => o.mesh), true);
    if (hits.length > 0) {
      let root = hits[0].object;
      while (root.parent && !objects.find(o => o.mesh === root)) root = root.parent;
      selected = objects.find(o => o.mesh === root);
      if (selected) {
        selected.dragging = true;
        selected.v.set(0,0,0);
      }
    }
  }

  function onMove(e) {
    if (!selected) return;
    const x = e.touches ? e.touches[0].clientX : e.clientX;
    const y = e.touches ? e.touches[0].clientY : e.clientY;
    mouse.x = (x / window.innerWidth) * 2 - 1;
    mouse.y = -(y / window.innerHeight) * 2 + 1;
    const vec = new THREE.Vector3(mouse.x, mouse.y, 0.5).unproject(camera);
    const dir = vec.sub(camera.position).normalize();
    const dist = -camera.position.z / dir.z;
    const pos = camera.position.clone().add(dir.multiplyScalar(dist));
    
    selected.v.x = (pos.x - selected.mesh.position.x) * 15;
    selected.v.y = (pos.y - selected.mesh.position.y) * 15;
    selected.mesh.position.copy(pos);
  }

  window.addEventListener('mousedown', onDown);
  window.addEventListener('mousemove', onMove);
  window.addEventListener('mouseup', () => { if (selected) selected.dragging = false; selected = null; });
  window.addEventListener('touchstart', onDown);
  window.addEventListener('touchmove', onMove);
  window.addEventListener('touchend', () => { if (selected) selected.dragging = false; selected = null; });
  window.addEventListener('resize', () => {
    renderer.setSize(window.innerWidth, window.innerHeight);
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    updateBox();
  });

  updateBox();
  animate();
})();
</script>
</body>
</html>
