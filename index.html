<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ONG – FINAL LUXE</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@900&family=Space+Mono:wght@400&display=swap');
  
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { margin: 0; overflow: hidden; background: #0a0a0a; }

  nav {
    position: fixed;
    top: 0; left: 0; width: 100%;
    padding: 30px 40px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    z-index: 2000;
  }

  .brand {
    font-family: 'Space Mono', monospace;
    font-size: 0.9rem;
    letter-spacing: 0.6em;
    color: #ffffff;
    text-transform: uppercase;
    text-decoration: none;
  }

  .menu-btn {
    width: 30px;
    height: 20px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    cursor: pointer;
  }

  .menu-btn span {
    display: block;
    width: 100%;
    height: 2px;
    background: #ffffff;
  }

  #title-container {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 1000;
    pointer-events: none;
  }

  #title-container h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(3rem, 18vw, 12rem);
    letter-spacing: 0.1em;
    color: #ffffff;
    white-space: nowrap;
  }

  #canvas3d {
    position: absolute;
    top: 0; left: 0;
    z-index: 1;
    outline: none;
  }
</style>
</head>
<body>

<nav>
  <a href="#" class="brand">KIMERICA</a>
  <div class="menu-btn" onclick="alert('Menu Open')">
    <span></span>
    <span></span>
    <span></span>
  </div>
</nav>

<div id="title-container">
  <h1>LOVE ONG</h1>
</div>

<canvas id="canvas3d"></canvas>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

<script>
(function() {
  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(35, window.innerWidth / window.innerHeight, 0.1, 1000);
  const renderer = new THREE.WebGLRenderer({ 
    canvas: document.getElementById('canvas3d'), 
    antialias: true,
    alpha: true 
  });
  
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 2.5;

  camera.position.z = 24;

  // LUCES
  scene.add(new THREE.AmbientLight(0xffffff, 0.5));
  const sun = new THREE.DirectionalLight(0xffffff, 3);
  sun.position.set(5, 15, 10);
  scene.add(sun);

  // CARGA DE TEXTURA (image.png)
  const textureLoader = new THREE.TextureLoader();
  const goldTexture = textureLoader.load('image.png');
  goldTexture.anisotropy = 16;

  let model;
  const loader = new THREE.GLTFLoader();

  loader.load('Meshy_AI_morango_0506164222_texture.glb', (gltf) => {
    model = gltf.scene;
    
    // Ajuste de escala inicial
    model.scale.set(5, 5, 5); 

    model.traverse(n => {
      if (n.isMesh) {
        // ELIMINAMOS LA TEXTURA ANTERIOR Y APLICAMOS LA NUEVA
        n.material = new THREE.MeshStandardMaterial({
          map: goldTexture,
          metalness: 1.0,
          roughness: 0.1,
          color: 0xffffff // Asegura que la textura se vea con sus colores originales
        });
        n.material.needsUpdate = true;
      }
    });

    scene.add(model);
  });

  function loop() {
    if (model) {
      model.rotation.y += 0.01;
    }
    renderer.render(scene, camera);
    requestAnimationFrame(loop);
  }

  // REAJUSTE DE PANTALLA
  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

  loop();
})();
</script>
</body>
</html>
