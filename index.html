<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LOVE – Oro & Rojo Brillante</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@900&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body { 
    margin: 0; overflow: hidden; 
    background: #ff0000; /* Rojo Brillante */
  }

  #title {
    position: fixed;
    top: 50px; left: 0; width: 100%;
    text-align: center;
    font-family: 'Playfair Display', serif;
    font-size: clamp(3rem, 15vw, 9rem);
    letter-spacing: 0.5em;
    color: #ffffff;
    z-index: 100;
    pointer-events: none;
    text-shadow: 0 10px 40px rgba(0,0,0,0.2);
    white-space: nowrap;
  }

  canvas { display: block; cursor: grab; }
</style>
</head>
<body>

<div id="title">LOVE</div>
<canvas id="canvas3d"></canvas>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

<script>
(function() {
  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
  const renderer = new THREE.WebGLRenderer({ 
    canvas: document.getElementById('canvas3d'), 
    antialias: true,
    powerPreference: "high-performance"
  });
  
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(window.devicePixelRatio);
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 2.2; // Alta luminosidad

  camera.position.z = 15;

  // ILUMINACIÓN DE ESTUDIO (Luminosidad máxima)
  const ambientLight = new THREE.AmbientLight(0xffffff, 1.2);
  scene.add(ambientLight);

  const mainLight = new THREE.DirectionalLight(0xffffff, 2.5);
  mainLight.position.set(5, 20, 10);
  scene.add(mainLight);

  const fillLight = new THREE.PointLight(0xffd700, 1.5);
  fillLight.position.set(-10, -5, 5);
  scene.add(fillLight);

  const objects = [];
  const loader = new THREE.GLTFLoader();

  const viewSize = { w: 0, h: 0 };
  function updateLimits() {
    const fov = (camera.fov * Math.PI) / 180;
    viewSize.h = 2 * Math.tan(fov / 2) * camera.position.z;
    viewSize.w = viewSize.h * camera.aspect;
  }
  updateLimits();

  loader.load('Meshy_AI_morango_0506164222_texture.glb', (gltf) => {
    const master = gltf.scene;
    const count = 50; 

    for (let i = 0; i < count; i++) {
      const model = master.clone();
      const s = 0.5 + Math.random() * 1.6;
      model.scale.set(s, s, s);

      model.traverse(child => {
        if (child.isMesh) {
          // Mantenemos la textura original pero inyectamos el acabado dorado
          child.material.color.setHex(0xffd700); 
          child.material.metalness = 1.0;
          child.material.roughness = 0.1; // Brillo máximo
          child.material.envMapIntensity = 2.0;
        }
      });

      model.position.set(
        (Math.random() - 0.5) * (viewSize.w * 0.8),
        (Math.random() * viewSize.h),
        (Math.random() - 0.5) * 3
      );

      scene.add(model);
      objects.push({
        mesh: model,
        radius: s * 0.72, 
        vel: new THREE.Vector2(0, -8),
        isDragging: false
      });
    }
  });

  const GRAVITY = -28;
  const BOUNCE = 0.15; // Sólido, rebote mínimo

  function update() {
    const dt = 0.016;

    for (let i = 0; i < objects.length; i++) {
      const o = objects[i];
      if (o.isDragging) continue;

      // Gravedad y Movimiento
      o.vel.y += GRAVITY * dt;
      o.mesh.position.y += o.vel.y * dt;
      o.mesh.position.x += o.vel.x * dt;

      // Colisión Bordes
      const floor = -viewSize.h / 2 + o.radius;
      if (o.mesh.position.y < floor) {
        o.mesh.position.y = floor;
        o.vel.y *= -BOUNCE;
        o.vel.x *= 0.8; 
      }

      const wall = viewSize.w / 2 - o.radius;
      if (Math.abs(o.mesh.position.x) > wall) {
        o.mesh.position.x = Math.sign(o.mesh.position.x) * wall;
        o.vel.x *= -BOUNCE;
      }

      // COLISIÓN ENTRE OBJETOS (Para apilarse sin fundirse)
      for (let j = i + 1; j < objects.length; j++) {
        const other = objects[j];
        const dx = other.mesh.position.x - o.mesh.position.x;
        const dy = other.mesh.position.y - o.mesh.position.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        const minDist = o.radius + other.radius;

        if (dist < minDist) {
          const angle = Math.atan2(dy, dx);
          const overlap = minDist - dist;
          
          // Resolución física para encimarse
          const tx = Math.cos(angle) * overlap * 0.5;
          const ty = Math.sin(angle) * overlap * 0.5;

          o.mesh.position.x -= tx;
          o.mesh.position.y -= ty;
          other.mesh.position.x += tx;
          other.mesh.position.y += ty;

          // Pierden inercia para quedarse apilados
          o.vel.y *= 0.6;
          other.vel.y *= 0.6;
        }
      }
    }

    renderer.render(scene, camera);
    requestAnimationFrame(update);
  }

  // Interacción (Grab & Move)
  const raycaster = new THREE.Raycaster();
  const mouse = new THREE.Vector2();
  let selected = null;

  function handleInput(e) {
    const x = e.touches ? e.touches[0].clientX : e.clientX;
    const y = e.touches ? e.touches[0].clientY : e.clientY;
    mouse.x = (x / window.innerWidth) * 2 - 1;
    mouse.y = -(y / window.innerHeight) * 2 + 1;

    if (selected) {
      const vec = new THREE.Vector3(mouse.x, mouse.y, 0.5).unproject(camera);
      const dir = vec.sub(camera.position).normalize();
      const pos = camera.position.clone().add(dir.multiplyScalar(-camera.position.z / dir.z));
      
      selected.vel.x = (pos.x - selected.mesh.position.x) * 12;
      selected.vel.y = (pos.y - selected.mesh.position.y) * 12;
      selected.mesh.position.copy(pos);
    }
  }

  function onDown() {
    raycaster.setFromCamera(mouse, camera);
    const hits = raycaster.intersectObjects(objects.map(o => o.mesh), true);
    if (hits.length > 0) {
      let root = hits[0].object;
      while(root.parent && !objects.find(o => o.mesh === root)) root = root.parent;
      selected = objects.find(o => o.mesh === root);
      if (selected) selected.isDragging = true;
    }
  }

  window.addEventListener('mousedown', onDown);
  window.addEventListener('mousemove', handleInput);
  window.addEventListener('mouseup', () => { if(selected) selected.isDragging = false; selected = null; });
  window.addEventListener('touchstart', onDown);
  window.addEventListener('touchmove', handleInput);
  window.addEventListener('touchend', () => { if(selected) selected.isDragging = false; selected = null; });

  window.addEventListener('resize', () => {
    renderer.setSize(window.innerWidth, window.innerHeight);
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    updateLimits();
  });

  update();
})();
</script>
</body>
</html>
