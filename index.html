<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LOVE – Vitrina de Oro</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@900&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body { 
    margin: 0; overflow: hidden; 
    background: #ff0000; /* Rojo Brillante Técnico */
  }

  #title {
    position: fixed;
    top: 60px; left: 0; width: 100%;
    text-align: center;
    font-family: 'Playfair Display', serif;
    font-size: clamp(3rem, 18vw, 10rem);
    letter-spacing: 0.4em;
    color: white;
    z-index: 10;
    pointer-events: none;
    text-shadow: 0 15px 40px rgba(0,0,0,0.2);
    white-space: nowrap; /* Título en una sola línea */
  }

  canvas { display: block; cursor: grab; }
</style>
</head>
<body>

<div id="title">LOVE</div>
<canvas id="canvas3d"></canvas>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

<script>
(function() {
  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
  const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('canvas3d'), antialias: true });
  
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(window.devicePixelRatio);
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.8;

  camera.position.z = 14;

  // Iluminación para resaltar el dorado metálico
  scene.add(new THREE.AmbientLight(0xffffff, 0.4));
  const light = new THREE.DirectionalLight(0xffffff, 1.5);
  light.position.set(5, 15, 10);
  scene.add(light);

  const objects = [];
  const loader = new THREE.GLTFLoader();

  const viewSize = { w: 0, h: 0 };
  function updateLimits() {
    const fov = (camera.fov * Math.PI) / 180;
    viewSize.h = 2 * Math.tan(fov / 2) * camera.position.z;
    viewSize.w = viewSize.h * camera.aspect;
  }
  updateLimits();

  loader.load('Meshy_AI_morango_0506164222_texture.glb', (gltf) => {
    const master = gltf.scene;
    const count = 55; // Suficientes para llenar hacia arriba

    for (let i = 0; i < count; i++) {
      const model = master.clone();
      const s = 0.6 + Math.random() * 1.4;
      model.scale.set(s, s, s);

      model.traverse(child => {
        if (child.isMesh) {
          child.material = new THREE.MeshStandardMaterial({
            color: 0xc5a059, // Dorado ocre, menos amarillo
            metalness: 1.0,
            roughness: 0.15,
            emissive: 0x110a00,
            emissiveIntensity: 0.1
          });
        }
      });

      // Aparecen arriba para caer y apilarse
      model.position.set(
        (Math.random() - 0.5) * (viewSize.w * 0.9),
        (Math.random() * viewSize.h),
        (Math.random() - 0.5) * 2
      );

      scene.add(model);
      objects.push({
        mesh: model,
        radius: s * 0.75,
        vel: new THREE.Vector2(0, -10),
        isDragging: false
      });
    }
  });

  const GRAVITY = -30;
  const BOUNCE = 0.1; // Rebote muy seco/sólido

  function update() {
    const dt = 0.016;

    for (let i = 0; i < objects.length; i++) {
      const o = objects[i];
      if (o.isDragging) continue;

      // Gravedad
      o.vel.y += GRAVITY * dt;
      o.mesh.position.y += o.vel.y * dt;
      o.mesh.position.x += o.vel.x * dt;

      // Colisión Bordes
      const floor = -viewSize.h / 2 + o.radius;
      if (o.mesh.position.y < floor) {
        o.mesh.position.y = floor;
        o.vel.y *= -BOUNCE;
        o.vel.x *= 0.7; // Fricción suelo
      }

      const wall = viewSize.w / 2 - o.radius;
      if (Math.abs(o.mesh.position.x) > wall) {
        o.mesh.position.x = Math.sign(o.mesh.position.x) * wall;
        o.vel.x *= -BOUNCE;
      }

      // COLISIÓN ENTRE MUESTRAS (Sólidos apilables)
      for (let j = i + 1; j < objects.length; j++) {
        const other = objects[j];
        const dx = other.mesh.position.x - o.mesh.position.x;
        const dy = other.mesh.position.y - o.mesh.position.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        const minDist = o.radius + other.radius;

        if (dist < minDist) {
          const angle = Math.atan2(dy, dx);
          const overlap = minDist - dist;
          
          // Separar para que se encimen
          const tx = Math.cos(angle) * overlap * 0.5;
          const ty = Math.sin(angle) * overlap * 0.5;

          o.mesh.position.x -= tx;
          o.mesh.position.y -= ty;
          other.mesh.position.x += tx;
          other.mesh.position.y += ty;

          // Perder energía en el choque (apilamiento)
          o.vel.y *= 0.5;
          other.vel.y *= 0.5;
        }
      }
    }

    renderer.render(scene, camera);
    requestAnimationFrame(update);
  }

  // Lógica de Grabbing
  const raycaster = new THREE.Raycaster();
  const mouse = new THREE.Vector2();
  let selected = null;

  function onPointerMove(e) {
    const x = e.touches ? e.touches[0].clientX : e.clientX;
    const y = e.touches ? e.touches[0].clientY : e.clientY;
    mouse.x = (x / window.innerWidth) * 2 - 1;
    mouse.y = -(y / window.innerHeight) * 2 + 1;

    if (selected) {
      const vec = new THREE.Vector3(mouse.x, mouse.y, 0.5).unproject(camera);
      const dir = vec.sub(camera.position).normalize();
      const pos = camera.position.clone().add(dir.multiplyScalar(-camera.position.z / dir.z));
      
      selected.vel.x = (pos.x - selected.mesh.position.x) * 10;
      selected.vel.y = (pos.y - selected.mesh.position.y) * 10;
      selected.mesh.position.x = pos.x;
      selected.mesh.position.y = pos.y;
    }
  }

  function onPointerDown() {
    raycaster.setFromCamera(mouse, camera);
    const hits = raycaster.intersectObjects(objects.map(o => o.mesh), true);
    if (hits.length > 0) {
      let root = hits[0].object;
      while(root.parent && !objects.find(o => o.mesh === root)) root = root.parent;
      selected = objects.find(o => o.mesh === root);
      if (selected) selected.isDragging = true;
    }
  }

  window.addEventListener('mousedown', onPointerDown);
  window.addEventListener('mousemove', onPointerMove);
  window.addEventListener('mouseup', () => { if(selected) selected.isDragging = false; selected = null; });
  window.addEventListener('touchstart', onPointerDown);
  window.addEventListener('touchmove', onPointerMove);
  window.addEventListener('touchend', () => { if(selected) selected.isDragging = false; selected = null; });

  update();
})();
</script>
</body>
</html>
