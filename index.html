<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ONG – LUXE</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@900&family=Space+Mono:wght@400&display=swap');
  
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { margin: 0; overflow: hidden; background: #ff0000; }

  nav {
    position: fixed;
    top: 0; left: 0; width: 100%;
    padding: 30px 40px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    z-index: 10000;
  }

  .brand {
    font-family: 'Space Mono', monospace;
    font-size: 0.9rem;
    letter-spacing: 0.6em;
    color: #ffffff;
    text-transform: uppercase;
    text-decoration: none;
    pointer-events: auto;
  }

  .menu-btn {
    width: 32px; height: 12px;
    display: flex; flex-direction: column; justify-content: space-between;
    cursor: pointer; pointer-events: auto;
  }

  .menu-btn span { display: block; width: 100%; height: 2px; background: #ffffff; }

  #title {
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 100%; text-align: center;
    font-family: 'Playfair Display', serif;
    font-size: clamp(3rem, 18vw, 12rem);
    letter-spacing: 0.1em;
    color: #ffffff;
    z-index: 1; /* Detrás de las fresas */
    pointer-events: none;
    white-space: nowrap;
    opacity: 0.8;
  }

  canvas { position: absolute; top: 0; left: 0; z-index: 5; cursor: grab; }
</style>
</head>
<body>

<nav>
  <a href="#" class="brand">ONG</a>
  <div class="menu-btn"><span></span><span></span></div>
</nav>

<div id="title">LOVE ONG</div>
<canvas id="canvas3d"></canvas>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

<script>
(function() {
  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(35, window.innerWidth / window.innerHeight, 0.1, 1000);
  const renderer = new THREE.WebGLRenderer({ 
    canvas: document.getElementById('canvas3d'), 
    antialias: true,
    alpha: true 
  });
  
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 3.0; // Brillo extremo para el oro

  camera.position.z = 22;

  // LUCES ESTRATÉGICAS
  const amb = new THREE.AmbientLight(0xffffff, 0.4);
  scene.add(amb);
  
  const light1 = new THREE.DirectionalLight(0xffffff, 5); // Luz principal
  light1.position.set(10, 20, 15);
  scene.add(light1);

  const light2 = new THREE.PointLight(0xffaa00, 8); // Brillo cálido
  light2.position.set(-15, -10, 10);
  scene.add(light2);

  const objects = [];
  const loader = new THREE.GLTFLoader();

  let vSize = { w: 0, h: 0 };
  function updateLimits() {
    const fov = (camera.fov * Math.PI) / 180;
    vSize.h = 2 * Math.tan(fov / 2) * camera.position.z;
    vSize.w = vSize.h * camera.aspect;
  }
  updateLimits();

  loader.load('Meshy_AI_morango_0506164222_texture.glb', (gltf) => {
    const master = gltf.scene;
    const count = 160;

    for (let i = 0; i < count; i++) {
      const model = master.clone();
      const s = Math.random() > 0.85 ? 2.8 : (0.5 + Math.random() * 1.5);
      model.scale.set(s, s, s);

      model.traverse(n => {
        if (n.isMesh) {
          n.material.color.setHex(0xFFD700); 
          n.material.metalness = 1.0;
          n.material.roughness = 0.05; // Muy pulido para textura brillante
          n.material.emissive = new THREE.Color(0x331a00);
          n.material.emissiveIntensity = 0.6;
        }
      });

      // DISTRIBUCIÓN SUSPENDIDA (No amontonada)
      model.position.set(
        (Math.random() - 0.5) * vSize.w * 1.2,
        (Math.random() - 0.5) * vSize.h * 1.2,
        (Math.random() - 0.5) * 6
      );

      // Valores para animación suave
      const floatData = {
        mesh: model,
        origin: model.position.clone(),
        speed: 0.2 + Math.random() * 0.5,
        offset: Math.random() * Math.PI * 2,
        rot: new THREE.Vector3(Math.random()*0.01, Math.random()*0.01, Math.random()*0.01)
      };

      scene.add(model);
      objects.push(floatData);
    }
  });

  function loop(time) {
    const t = time * 0.001;

    objects.forEach(o => {
      // Movimiento de suspensión suave (senoidal)
      o.mesh.position.y = o.origin.y + Math.sin(t * o.speed + o.offset) * 0.5;
      o.mesh.position.x = o.origin.x + Math.cos(t * o.speed * 0.8 + o.offset) * 0.3;
      
      // Rotación lenta y lujosa
      o.mesh.rotation.x += o.rot.x;
      o.mesh.rotation.y += o.rot.y;
    });

    renderer.render(scene, camera);
    requestAnimationFrame(loop);
  }

  // INTERACCIÓN (Sigue funcionando el arrastre)
  const ray = new THREE.Raycaster();
  const mouse = new THREE.Vector2();
  let active = null;

  window.addEventListener('mousedown', (e) => {
    if (e.target.closest('nav')) return;
    mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
    ray.setFromCamera(mouse, camera);
    const hits = ray.intersectObjects(objects.map(o => o.mesh), true);
    if (hits.length > 0) {
      let root = hits[0].object;
      while(root.parent && !objects.find(o => o.mesh === root)) root = root.parent;
      active = objects.find(o => o.mesh === root);
    }
  });

  window.addEventListener('mousemove', (e) => {
    if (!active) return;
    mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
    const v = new THREE.Vector3(mouse.x, mouse.y, 0.5).unproject(camera);
    const d = v.sub(camera.position).normalize();
    const p = camera.position.clone().add(d.multiplyScalar(-camera.position.z / d.z));
    active.origin.copy(p); // Actualiza el punto de suspensión
  });

  window.addEventListener('mouseup', () => { active = null; });

  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
