<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ONG – GOLDEN RAIN</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@900&family=Space+Mono:wght@400&display=swap');
  
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { margin: 0; overflow: hidden; background: #ff0000; }

  /* NAVEGACIÓN SUPERIOR */
  nav {
    position: fixed;
    top: 0; left: 0; width: 100%;
    padding: 30px 40px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    z-index: 10000;
  }

  .brand {
    font-family: 'Space Mono', monospace;
    font-size: 0.9rem;
    letter-spacing: 0.6em;
    color: #ffffff;
    text-transform: uppercase;
    text-decoration: none;
  }

  .menu-btn {
    width: 32px; height: 12px;
    display: flex; flex-direction: column; justify-content: space-between;
    cursor: pointer;
  }

  .menu-btn span { display: block; width: 100%; height: 2px; background: #ffffff; }

  /* TÍTULO ENFRENTE (Z-INDEX 10) */
  #title {
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 100%; text-align: center;
    font-family: 'Playfair Display', serif;
    font-size: clamp(3rem, 18vw, 12rem);
    letter-spacing: 0.1em;
    color: #ffffff;
    z-index: 10; /* Superior al canvas */
    pointer-events: none;
    white-space: nowrap;
    text-shadow: 0 10px 30px rgba(0,0,0,0.2);
  }

  /* CANVAS DETRÁS (Z-INDEX 1) */
  canvas { position: absolute; top: 0; left: 0; z-index: 1; outline: none; }
</style>
</head>
<body>

<nav>
  <a href="#" class="brand">ONG</a>
  <div class="menu-btn"><span></span><span></span></div>
</nav>

<div id="title">LOVE ONG</div>
<canvas id="canvas3d"></canvas>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

<script>
(function() {
  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(35, window.innerWidth / window.innerHeight, 0.1, 1000);
  const renderer = new THREE.WebGLRenderer({ 
    canvas: document.getElementById('canvas3d'), 
    antialias: true,
    alpha: true 
  });
  
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 2.8;

  camera.position.z = 25;

  // ILUMINACIÓN PARA MÁXIMO DORADO
  const amb = new THREE.AmbientLight(0xffffff, 0.5);
  scene.add(amb);
  
  const light1 = new THREE.DirectionalLight(0xffffff, 4);
  light1.position.set(5, 15, 10);
  scene.add(light1);

  const light2 = new THREE.PointLight(0xffaa00, 6);
  light2.position.set(-10, -5, 15);
  scene.add(light2);

  const objects = [];
  const loader = new THREE.GLTFLoader();

  let vSize = { w: 0, h: 0 };
  function updateLimits() {
    const fov = (camera.fov * Math.PI) / 180;
    vSize.h = 2 * Math.tan(fov / 2) * camera.position.z;
    vSize.w = vSize.h * camera.aspect;
  }
  updateLimits();

  loader.load('Meshy_AI_morango_0506164222_texture.glb', (gltf) => {
    const master = gltf.scene;
    const count = 160;

    for (let i = 0; i < count; i++) {
      const model = master.clone();
      
      // Variabilidad de tamaños (Grandes y pequeñas)
      const s = Math.random() > 0.8 ? (2.2 + Math.random() * 1.5) : (0.4 + Math.random() * 1.0);
      model.scale.set(s, s, s);

      model.traverse(n => {
        if (n.isMesh) {
          n.material.color.setHex(0xFFD700); 
          n.material.metalness = 1.0;
          n.material.roughness = 0.08;
          n.material.emissive = new THREE.Color(0x331a00);
          n.material.emissiveIntensity = 0.4;
        }
      });

      // Posición inicial repartida
      model.position.set(
        (Math.random() - 0.5) * vSize.w * 1.5,
        (Math.random() - 0.5) * vSize.h * 3, // Empezar en diferentes alturas
        (Math.random() - 0.5) * 5
      );

      const item = {
        mesh: model,
        speed: 0.05 + Math.random() * 0.12, // Velocidad de caída más rápida
        rot: new THREE.Vector3(Math.random()*0.02, Math.random()*0.02, Math.random()*0.02)
      };

      scene.add(model);
      objects.push(item);
    }
  });

  function loop() {
    objects.forEach(o => {
      // Movimiento de caída constante
      o.mesh.position.y -= o.speed;

      // Rotación
      o.mesh.rotation.x += o.rot.x;
      o.mesh.rotation.y += o.rot.y;

      // Si sale por abajo, reaparece arriba
      const threshold = -vSize.h / 1.5;
      if (o.mesh.position.y < threshold) {
        o.mesh.position.y = vSize.h / 1.2;
        o.mesh.position.x = (Math.random() - 0.5) * vSize.w * 1.5;
      }
    });

    renderer.render(scene, camera);
    requestAnimationFrame(loop);
  }

  window.addEventListener('resize', () => {
    renderer.setSize(window.innerWidth, window.innerHeight);
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    updateLimits();
  });

  loop();
})();
</script>
</body>
</html>
