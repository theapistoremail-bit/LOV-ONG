<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LOVE – Acción Social</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@900&family=Space+Mono:wght@400&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: #2b0003; /* Rojo chocolate oscuro */
  }

  #threeCanvas {
    position: fixed;
    inset: 0;
    width: 100% !important;
    height: 100% !important;
    display: block;
    cursor: grab;
  }
  #threeCanvas:active { cursor: grabbing; }

  #titleContainer {
    position: fixed;
    top: 50px; left: 50%;
    transform: translateX(-50%);
    text-align: center;
    z-index: 20;
    pointer-events: none;
  }

  #title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2.5rem, 10vw, 5rem);
    letter-spacing: 0.4em;
    color: #ffffff;
    text-shadow: 0 10px 30px rgba(0,0,0,0.8);
  }

  #subtitle {
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.6em;
    color: #d4af37;
    margin-top: 10px;
    text-transform: uppercase;
  }

  #hamburger {
    position: fixed; top: 25px; left: 25px; z-index: 100;
    width: 50px; height: 50px; cursor: pointer;
    display: flex; flex-direction: column; justify-content: center;
    align-items: center; gap: 5px;
    background: rgba(0,0,0,0.5);
    border: 1px solid #d4af37;
    border-radius: 50%;
  }
  #hamburger span { display: block; width: 22px; height: 1.5px; background: #d4af37; }
</style>
</head>
<body>

<div id="titleContainer">
  <div id="title">L O V E</div>
  <div id="subtitle">FILANTROPÍA & CAMBIO</div>
</div>

<div id="hamburger">
  <span></span><span></span><span></span>
</div>

<canvas id="threeCanvas"></canvas>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

<script>
(function () {
  const canvas = document.getElementById('threeCanvas');
  const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
  renderer.setPixelRatio(window.devicePixelRatio);
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.shadowMap.enabled = true;
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.3;

  const scene = new THREE.Scene();

  const camera = new THREE.PerspectiveCamera(40, window.innerWidth / window.innerHeight, 0.1, 1000);
  camera.position.z = 15;

  const BOX = { W: 0, H: 0 };
  function updateBox() {
    const fovRad = (camera.fov * Math.PI) / 180;
    BOX.H = 2 * Math.tan(fovRad / 2) * camera.position.z;
    BOX.W = BOX.H * camera.aspect;
  }

  // Iluminación para resaltar la textura original de la malla
  scene.add(new THREE.AmbientLight(0xffffff, 0.8));
  const sun = new THREE.DirectionalLight(0xffffff, 1.5);
  sun.position.set(5, 15, 10);
  scene.add(sun);

  const objects = [];
  const loader = new THREE.GLTFLoader();

  loader.load('Meshy_AI_morango_0506164222_texture.glb', (gltf) => {
    const source = gltf.scene;
    const NUM = 50; 

    for (let i = 0; i < NUM; i++) {
      const model = source.clone();
      
      // Tamaños variados (extravagantes)
      const scale = Math.random() < 0.2 ? 2.3 : 0.4 + Math.random() * 0.9;
      model.scale.set(scale, scale, scale);

      model.traverse(n => {
        if (n.isMesh) {
          n.castShadow = true;
          // Usamos su textura original, solo ajustamos el brillo para que resalte
          n.material.metalness = 0.5;
          n.material.roughness = 0.4;
        }
      });

      // Posición repartida para que caigan
      model.position.set(
        (Math.random() - 0.5) * BOX.W,
        (Math.random() - 0.5) * BOX.H,
        (Math.random() - 0.5) * 3
      );

      scene.add(model);
      objects.push({
        mesh: model,
        r: scale * 0.8,
        vy: 0,
        vx: 0,
        dragging: false
      });
    }
  });

  // FÍSICA DE PESO (Gravedad fuerte, rebote nulo)
  const GRAVITY = -30; 
  const BOUNCE = 0.05; // Al tocar el suelo "pesan", no rebotan

  function animate() {
    requestAnimationFrame(animate);
    const dt = 0.016;

    objects.forEach(o => {
      if (o.dragging) return;

      // Aplicar peso
      o.vy += GRAVITY * dt;
      o.mesh.position.y += o.vy * dt;
      o.mesh.position.x += o.vx * dt;

      // Suelo (fondo de la pantalla)
      const floor = -BOX.H / 2 + o.r;
      const wall = BOX.W / 2 - o.r;

      if (o.mesh.position.y < floor) {
        o.mesh.position.y = floor;
        o.vy *= -BOUNCE; // Rebote casi inexistente
        o.vx *= 0.5;    // Fricción al caer
      }

      // Paredes laterales
      if (Math.abs(o.mesh.position.x) > wall) {
        o.mesh.position.x = Math.sign(o.mesh.position.x) * wall;
        o.vx *= -BOUNCE;
      }

      // Rotación mínima (inercia pesada)
      o.mesh.rotation.y += o.vx * 0.02;
    });

    renderer.render(scene, camera);
  }

  // Interacción para jugar con los modelos
  let dragObj = null;
  const raycaster = new THREE.Raycaster();
  const mouse = new THREE.Vector2();

  function onPointerDown(e) {
    const x = e.touches ? e.touches[0].clientX : e.clientX;
    const y = e.touches ? e.touches[0].clientY : e.clientY;
    mouse.x = (x / window.innerWidth) * 2 - 1;
    mouse.y = -(y / window.innerHeight) * 2 + 1;

    raycaster.setFromCamera(mouse, camera);
    const hits = raycaster.intersectObjects(objects.map(o => o.mesh), true);
    if (hits.length > 0) {
      let root = hits[0].object;
      while (root.parent && !objects.find(o => o.mesh === root)) root = root.parent;
      dragObj = objects.find(o => o.mesh === root);
      if (dragObj) dragObj.dragging = true;
    }
  }

  function onPointerMove(e) {
    if (!dragObj) return;
    const x = e.touches ? e.touches[0].clientX : e.clientX;
    const y = e.touches ? e.touches[0].clientY : e.clientY;
    mouse.x = (x / window.innerWidth) * 2 - 1;
    mouse.y = -(y / window.innerHeight) * 2 + 1;

    const vector = new THREE.Vector3(mouse.x, mouse.y, 0.5).unproject(camera);
    const dir = vector.sub(camera.position).normalize();
    const dist = -camera.position.z / dir.z;
    const pos = camera.position.clone().add(dir.multiplyScalar(dist));
    
    // Al moverlo, calculamos velocidad para que tenga inercia al soltar
    dragObj.vx = (pos.x - dragObj.mesh.position.x) * 10;
    dragObj.vy = (pos.y - dragObj.mesh.position.y) * 10;
    dragObj.mesh.position.x = pos.x;
    dragObj.mesh.position.y = pos.y;
  }

  function onPointerUp() {
    if (dragObj) dragObj.dragging = false;
    dragObj = null;
  }

  window.addEventListener('mousedown', onPointerDown);
  window.addEventListener('mousemove', onPointerMove);
  window.addEventListener('mouseup', onPointerUp);
  window.addEventListener('touchstart', onPointerDown);
  window.addEventListener('touchmove', onPointerMove);
  window.addEventListener('touchend', onPointerUp);
  window.addEventListener('resize', () => {
    renderer.setSize(window.innerWidth, window.innerHeight);
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    updateBox();
  });

  updateBox();
  animate();
})();
</script>
</body>
</html>
