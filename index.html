<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LOVE ONG – KIMERICA</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@900&family=Space+Mono:wght@400&display=swap');
  
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { margin: 0; overflow: hidden; background: #ff0000; }

  /* NAVIGATION BAR */
  nav {
    position: fixed;
    top: 0; left: 0; width: 100%;
    padding: 30px 40px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    z-index: 10000;
  }

  .brand {
    font-family: 'Space Mono', monospace;
    font-size: 0.85rem;
    letter-spacing: 0.6em;
    color: #ffffff;
    text-transform: uppercase;
    text-decoration: none;
    pointer-events: auto;
  }

  .menu-btn {
    width: 32px; height: 12px;
    display: flex; flex-direction: column; justify-content: space-between;
    cursor: pointer; pointer-events: auto;
  }

  .menu-btn span { display: block; width: 100%; height: 2px; background: #ffffff; }

  /* TÍTULO DETRÁS DE LAS FRESAS */
  #title {
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 100%; text-align: center;
    font-family: 'Playfair Display', serif;
    font-size: clamp(3rem, 18vw, 12rem);
    letter-spacing: 0.2em;
    color: #ffffff;
    z-index: 1;
    pointer-events: none;
    white-space: nowrap;
    text-shadow: 0 10px 50px rgba(0,0,0,0.2);
  }

  canvas { position: absolute; top: 0; left: 0; z-index: 5; cursor: grab; outline: none; }
  canvas:active { cursor: grabbing; }
</style>
</head>
<body>

<nav>
  <a href="#" class="brand">KIMERICA</a>
  <div class="menu-btn">
    <span></span>
    <span></span>
  </div>
</nav>

<div id="title">LOVE ONG</div>
<canvas id="canvas3d"></canvas>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

<script>
(function() {
  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(35, window.innerWidth / window.innerHeight, 0.1, 1000);
  const renderer = new THREE.WebGLRenderer({ 
    canvas: document.getElementById('canvas3d'), 
    antialias: true,
    alpha: true 
  });
  
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 2.8;

  camera.position.z = 24;

  // ILUMINACIÓN DE ESTUDIO PARA ORO
  const amb = new THREE.AmbientLight(0xffffff, 1.0);
  scene.add(amb);
  
  const sun = new THREE.DirectionalLight(0xffffff, 4);
  sun.position.set(5, 15, 10);
  scene.add(sun);

  const backLight = new THREE.PointLight(0xffcc00, 3);
  backLight.position.set(-10, -10, 5);
  scene.add(backLight);

  const objects = [];
  const loader = new THREE.GLTFLoader();

  let vSize = { w: 0, h: 0 };
  function updateLimits() {
    const fov = (camera.fov * Math.PI) / 180;
    vSize.h = 2 * Math.tan(fov / 2) * camera.position.z;
    vSize.w = vSize.h * camera.aspect;
  }
  updateLimits();

  loader.load('Meshy_AI_morango_0506164222_texture.glb', (gltf) => {
    const master = gltf.scene;
    const count = 120; // LLENADO TOTAL

    for (let i = 0; i < count; i++) {
      const model = master.clone();
      const s = 1.2 + Math.random() * 2.0;
      model.scale.set(s, s, s);

      model.traverse(n => {
        if (n.isMesh) {
          n.material.color.setHex(0xd4af37); // Oro puro
          n.material.metalness = 1.0;
          n.material.roughness = 0.08;
          n.material.emissive = new THREE.Color(0x442200);
          n.material.emissiveIntensity = 0.3;
        }
      });

      // Distribución inicial por toda la pantalla
      model.position.set(
        (Math.random() - 0.5) * vSize.w,
        (Math.random() - 0.5) * vSize.h * 2, // Empiezan desde arriba
        (Math.random() - 0.5) * 4
      );

      scene.add(model);
      objects.push({
        mesh: model,
        r: s * 0.75, // Radio de colisión
        v: new THREE.Vector2((Math.random()-0.5)*2, -2),
        drag: false
      });
    }
  });

  const GRAVITY = -5; // Gravedad suave
  const DAMPING = 0.97; // Flotabilidad (fricción)

  function loop() {
    const dt = 0.016;

    for (let i = 0; i < objects.length; i++) {
      const o = objects[i];
      if (o.drag) continue;

      // Movimiento físico
      o.v.y += GRAVITY * dt;
      o.v.multiplyScalar(DAMPING);
      o.mesh.position.y += o.v.y;
      o.mesh.position.x += o.v.x;
      o.mesh.rotation.z += o.v.x * 0.1;

      // Colisiones entre fresas (Efecto Sólido)
      for (let j = i + 1; j < objects.length; j++) {
        const other = objects[j];
        const dx = other.mesh.position.x - o.mesh.position.x;
        const dy = other.mesh.position.y - o.mesh.position.y;
        const dist = Math.sqrt(dx*dx + dy*dy);
        const minDist = o.r + other.r;

        if (dist < minDist) {
          const angle = Math.atan2(dy, dx);
          const tx = o.mesh.position.x + Math.cos(angle) * minDist;
          const ty = o.mesh.position.y + Math.sin(angle) * minDist;
          const ax = (tx - other.mesh.position.x) * 0.5;
          const ay = (ty - other.mesh.position.y) * 0.5;
          
          o.v.x -= ax; o.v.y -= ay;
          other.v.x += ax; other.v.y += ay;
        }
      }

      // Límites de pantalla
      const floor = -vSize.h / 2 + o.r;
      if (o.mesh.position.y < floor) {
        o.mesh.position.y = floor;
        o.v.y *= -0.2; // Rebote muy suave
      }
      const wall = vSize.w / 2 - o.r;
      if (Math.abs(o.mesh.position.x) > wall) {
        o.mesh.position.x = Math.sign(o.mesh.position.x) * wall;
        o.v.x *= -0.4;
      }
    }

    renderer.render(scene, camera);
    requestAnimationFrame(loop);
  }

  // INTERACCION REPARADA
  const ray = new THREE.Raycaster();
  const mouse = new THREE.Vector2();
  let active = null;

  function updateMouse(e) {
    const x = e.touches ? e.touches[0].clientX : e.clientX;
    const y = e.touches ? e.touches[0].clientY : e.clientY;
    mouse.x = (x / window.innerWidth) * 2 - 1;
    mouse.y = -(y / window.innerHeight) * 2 + 1;
  }

  window.addEventListener('mousedown', (e) => {
    if (e.target.closest('nav')) return;
    updateMouse(e);
    ray.setFromCamera(mouse, camera);
    const hits = ray.intersectObjects(objects.map(o => o.mesh), true);
    if (hits.length > 0) {
      let root = hits[0].object;
      while(root.parent && !objects.find(o => o.mesh === root)) root = root.parent;
      active = objects.find(o => o.mesh === root);
      if (active) active.drag = true;
    }
  });

  window.addEventListener('mousemove', (e) => {
    updateMouse(e);
    if (active) {
      const vector = new THREE.Vector3(mouse.x, mouse.y, 0.5).unproject(camera);
      const dir = vector.sub(camera.position).normalize();
      const distance = -camera.position.z / dir.z;
      const pos = camera.position.clone().add(dir.multiplyScalar(distance));
      active.mesh.position.lerp(pos, 0.25);
      active.v.set(0, 0);
    }
  });

  window.addEventListener('mouseup', () => { if(active) active.drag = false; active = null; });
  window.addEventListener('resize', () => {
    renderer.setSize(window.innerWidth, window.innerHeight);
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    updateLimits();
  });

  loop();
})();
</script>
</body>
</html>
