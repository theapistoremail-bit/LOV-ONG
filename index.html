<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LOVE – Vitrina de Oro</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@900&family=Space+Mono:wght@400&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: #5e000a; /* Rojo un poco más profundo para resaltar el oro */
  }

  #threeCanvas {
    position: fixed;
    inset: 0;
    width: 100% !important;
    height: 100% !important;
    display: block;
    cursor: grab;
  }
  #threeCanvas:active { cursor: grabbing; }

  #glassFrame {
    position: fixed;
    inset: 0;
    pointer-events: none;
    border: 1px solid rgba(255,215,0,0.15);
    box-shadow:
      inset 0  2px 0 rgba(255,215,0,0.3),
      inset 0 -2px 0 rgba(255,255,255,0.05);
    z-index: 5;
  }

  #titleContainer {
    position: fixed;
    top: 30px; left: 50%;
    transform: translateX(-50%);
    text-align: center;
    z-index: 20;
    pointer-events: none;
  }

  #title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.5rem, 5vw, 3rem);
    letter-spacing: 0.6em;
    color: #fff8f0;
    text-shadow: 0 0 30px rgba(255,180,50,0.4);
  }

  #subtitle {
    font-family: 'Space Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.8em;
    color: #ffca28; /* Dorado Juan/Omar */
    margin-top: 8px;
    text-transform: uppercase;
    opacity: 0.9;
  }

  #hint {
    position: fixed;
    bottom: 20px; left: 50%;
    transform: translateX(-50%);
    font-family: 'Space Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.3em;
    color: rgba(255,215,0,0.4);
    text-transform: uppercase;
    z-index: 20;
    pointer-events: none;
  }

  /* Menú lateral */
  #hamburger {
    position: fixed; top: 20px; left: 20px; z-index: 100;
    width: 46px; height: 46px; cursor: pointer;
    display: flex; flex-direction: column; justify-content: center;
    align-items: center; gap: 6px;
    background: rgba(0,0,0,0.2);
    border: 1px solid rgba(255,215,0,0.3);
    border-radius: 50%; backdrop-filter: blur(10px);
    transition: 0.3s;
  }
  #hamburger:hover { background: rgba(255,215,0,0.15); }
  #hamburger span { display: block; width: 20px; height: 1.5px; background: #ffd700; border-radius: 1px; }

  #nav-overlay { position: fixed; inset: 0; z-index: 90; pointer-events: none; }
  #nav-overlay.open { pointer-events: all; }
  #nav-backdrop { position: absolute; inset: 0; background: rgba(0,0,0,0); transition: 0.5s; }
  #nav-overlay.open #nav-backdrop { background: rgba(0,0,0,0.6); backdrop-filter: blur(5px); }
  #nav-drawer {
    position: absolute; top: 0; left: 0;
    width: 300px; height: 100%;
    background: linear-gradient(180deg, #1a0002 0%, #3d0006 100%);
    transform: translateX(-100%);
    transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    display: flex; flex-direction: column; justify-content: center;
    padding: 0 50px;
    border-right: 1px solid rgba(255,215,0,0.1);
  }
  #nav-overlay.open #nav-drawer { transform: translateX(0); }
  #nav-drawer a {
    font-family: 'Playfair Display', serif;
    font-size: 1.8rem;
    color: #fff;
    text-decoration: none;
    margin: 15px 0;
    transition: 0.3s;
    opacity: 0.7;
  }
  #nav-drawer a:hover { opacity: 1; color: #ffd700; padding-left: 10px; }
</style>
</head>
<body>

<canvas id="threeCanvas"></canvas>
<div id="glassFrame"></div>

<div id="titleContainer">
  <div id="title">L O V E</div>
  <div id="subtitle">OMAR & JUAN</div>
</div>

<div id="hint">✦ INTERACTÚA CON LA JOYA ✦</div>

<div id="hamburger" onclick="toggleNav()">
  <span></span><span></span><span></span>
</div>

<div id="nav-overlay">
  <div id="nav-backdrop" onclick="closeNav()"></div>
  <div id="nav-drawer">
    <a href="#" onclick="closeNav()">Inicio</a>
    <a href="#" onclick="closeNav()">Colección</a>
    <a href="#" onclick="closeNav()">Contacto</a>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

<script>
(function () {
  const canvas = document.getElementById('threeCanvas');
  const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
  renderer.setPixelRatio(window.devicePixelRatio);
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.2;

  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x5e000a);
  scene.fog = new THREE.Fog(0x5e000a, 10, 40);

  const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
  const BOX = { W: 0, H: 0, D: 3 };

  function setSize() {
    const W = window.innerWidth;
    const H = window.innerHeight;
    renderer.setSize(W, H);
    camera.aspect = W / H;
    const camZ = 12;
    camera.position.set(0, 0, camZ);
    const fovRad = (camera.fov * Math.PI) / 180;
    BOX.H = 2 * Math.tan(fovRad / 2) * camZ;
    BOX.W = BOX.H * (W / H);
    camera.updateProjectionMatrix();
  }

  // Iluminación Estilo Joyería
  scene.add(new THREE.AmbientLight(0xffeebb, 0.7)); 
  
  const mainLight = new THREE.DirectionalLight(0xffffff, 2.5);
  mainLight.position.set(5, 10, 7);
  mainLight.castShadow = true;
  mainLight.shadow.mapSize.set(1024, 1024);
  scene.add(mainLight);

  const fillLight = new THREE.PointLight(0xffd700, 4, 20);
  fillLight.position.set(-5, 0, 5);
  scene.add(fillLight);

  // Material de Oro Brillante
  const goldMaterial = new THREE.MeshStandardMaterial({
    color: 0xffd700,
    metalness: 1.0,
    roughness: 0.15,
    emissive: 0x221100,
    emissiveIntensity: 0.2
  });

  const objects = [];
  const loader = new THREE.GLTFLoader();

  // Cargador de mallas
  loader.load('Meshy_AI_morango_0506164222_texture.glb', (gltf) => {
    const sourceModel = gltf.scene;
    const NUM = 35; // Cantidad para llenar la pantalla

    for (let i = 0; i < NUM; i++) {
      const model = sourceModel.clone();
      
      // Variación extrema de tamaños (desde pequeñas a muy grandes)
      const scale = 0.3 + Math.random() * 1.4; 
      model.scale.set(scale, scale, scale);

      model.traverse(n => {
        if (n.isMesh) {
          n.material = goldMaterial;
          n.castShadow = true;
          n.receiveShadow = true;
        }
      });

      const radius = scale * 0.7;
      // Posición inicial repartida por toda la pantalla
      model.position.set(
        (Math.random() - 0.5) * BOX.W,
        (Math.random() - 0.5) * BOX.H,
        (Math.random() - 0.5) * BOX.D
      );

      scene.add(model);
      objects.push({
        mesh: model,
        r: radius,
        vx: (Math.random() - 0.5) * 4,
        vy: (Math.random() - 0.5) * 4,
        vz: (Math.random() - 0.5) * 2,
        dragging: false
      });
    }
  });

  const clock = new THREE.Clock();
  const FRICTION = 0.98;
  const BOUNCE = 0.7;

  function animate() {
    requestAnimationFrame(animate);
    const dt = Math.min(clock.getDelta(), 0.03);

    objects.forEach(obj => {
      if (obj.dragging) return;

      // Movimiento y rebote simple
      obj.mesh.position.x += obj.vx * dt;
      obj.mesh.position.y += obj.vy * dt;
      obj.mesh.position.z += obj.vz * dt;

      obj.mesh.rotation.x += 0.5 * dt;
      obj.mesh.rotation.y += 0.3 * dt;

      // Límites de la "Vitrina"
      const limitX = BOX.W / 2 - obj.r;
      const limitY = BOX.H / 2 - obj.r;

      if (Math.abs(obj.mesh.position.x) > limitX) {
        obj.mesh.position.x = Math.sign(obj.mesh.position.x) * limitX;
        obj.vx *= -BOUNCE;
      }
      if (Math.abs(obj.mesh.position.y) > limitY) {
        obj.mesh.position.y = Math.sign(obj.mesh.position.y) * limitY;
        obj.vy *= -BOUNCE;
      }

      obj.vx *= FRICTION;
      obj.vy *= FRICTION;
      obj.vz *= FRICTION;
    });

    renderer.render(scene, camera);
  }

  // Interacción (Drag & Drop)
  const raycaster = new THREE.Raycaster();
  const mouse = new THREE.Vector2();
  let selected = null;

  function onPointerDown(e) {
    const x = e.touches ? e.touches[0].clientX : e.clientX;
    const y = e.touches ? e.touches[0].clientY : e.clientY;
    mouse.x = (x / window.innerWidth) * 2 - 1;
    mouse.y = -(y / window.innerHeight) * 2 + 1;

    raycaster.setFromCamera(mouse, camera);
    const intersects = raycaster.intersectObjects(objects.map(o => o.mesh), true);
    if (intersects.length > 0) {
      let root = intersects[0].object;
      while (root.parent && !objects.find(o => o.mesh === root)) root = root.parent;
      selected = objects.find(o => o.mesh === root);
      if (selected) selected.dragging = true;
    }
  }

  function onPointerMove(e) {
    if (!selected) return;
    const x = e.touches ? e.touches[0].clientX : e.clientX;
    const y = e.touches ? e.touches[0].clientY : e.clientY;
    mouse.x = (x / window.innerWidth) * 2 - 1;
    mouse.y = -(y / window.innerHeight) * 2 + 1;

    // Mover el objeto en el plano Z actual
    const vector = new THREE.Vector3(mouse.x, mouse.y, 0.5);
    vector.unproject(camera);
    const dir = vector.sub(camera.position).normalize();
    const distance = -camera.position.z / dir.z;
    const pos = camera.position.clone().add(dir.multiplyScalar(distance));
    
    selected.vx = (pos.x - selected.mesh.position.x) * 10;
    selected.vy = (pos.y - selected.mesh.position.y) * 10;
    selected.mesh.position.x = pos.x;
    selected.mesh.position.y = pos.y;
  }

  function onPointerUp() {
    if (selected) selected.dragging = false;
    selected = null;
  }

  window.addEventListener('mousedown', onPointerDown);
  window.addEventListener('mousemove', onPointerMove);
  window.addEventListener('mouseup', onPointerUp);
  window.addEventListener('touchstart', onPointerDown);
  window.addEventListener('touchmove', onPointerMove);
  window.addEventListener('touchend', onPointerUp);
  window.addEventListener('resize', setSize);

  setSize();
  animate();
})();

function toggleNav() { document.getElementById('nav-overlay').classList.toggle('open'); }
function closeNav() { document.getElementById('nav-overlay').classList.remove('open'); }
</script>
</body>
</html>
