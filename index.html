<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KIMERICA – LOVE</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@900&family=Space+Mono:wght@400&display=swap');
  
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { 
    margin: 0; 
    overflow: hidden; 
    background: #ff0000; /* Fondo Rojo Original */
  }

  /* NAVEGACIÓN */
  nav {
    position: fixed;
    top: 0; left: 0; width: 100%;
    padding: 30px 40px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    z-index: 3000;
  }

  .brand {
    font-family: 'Space Mono', monospace;
    font-size: 0.9rem;
    letter-spacing: 0.6em;
    color: #ffffff;
    text-transform: uppercase;
    text-decoration: none;
  }

  /* BURGER MENU */
  .menu-btn {
    width: 30px;
    height: 18px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    cursor: pointer;
    z-index: 4000;
  }

  .menu-btn span {
    display: block;
    width: 100%;
    height: 2px;
    background: #ffffff;
    transition: 0.3s;
  }

  /* MENÚ DESPLEGABLE */
  #menu-overlay {
    position: fixed;
    top: 0; right: -100%;
    width: 100%; height: 100%;
    background: rgba(0,0,0,0.95);
    z-index: 3500;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    transition: 0.5s ease;
  }

  #menu-overlay.active { right: 0; }

  #menu-overlay a {
    color: white;
    font-family: 'Playfair Display', serif;
    font-size: 3rem;
    text-decoration: none;
    margin: 10px 0;
  }

  /* TÍTULO DETRÁS DE LAS FRESAS */
  #title-container {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 500; /* Detrás del canvas de fresas */
    pointer-events: none;
  }

  #title-container h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(4rem, 25vw, 15rem);
    color: #ffffff;
    text-align: center;
  }

  #canvas3d {
    position: absolute;
    top: 0; left: 0;
    z-index: 1000; /* Fresas al frente */
    pointer-events: none; 
  }
</style>
</head>
<body>

<nav>
  <a href="#" class="brand">KIMERICA</a>
  <div class="menu-btn" id="burger">
    <span></span>
    <span></span>
    <span></span>
  </div>
</nav>

<div id="menu-overlay">
  <a href="#">Colección</a>
  <a href="#">Kimerica</a>
  <a href="#">Contacto</a>
</div>

<div id="title-container">
  <h1>LOVE</h1>
</div>

<canvas id="canvas3d"></canvas>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/cannon.js/0.6.2/cannon.min.js"></script>

<script>
(function() {
  // LÓGICA DEL MENÚ
  const burger = document.getElementById('burger');
  const menu = document.getElementById('menu-overlay');
  burger.onclick = () => menu.classList.toggle('active');

  // FÍSICA
  const world = new CANNON.World();
  world.gravity.set(0, -15, 0); 

  // ESCENA
  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(35, window.innerWidth / window.innerHeight, 0.1, 1000);
  const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('canvas3d'), antialias: true, alpha: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

  camera.position.set(0, 0, 25);

  // LUZ MÁS FUERTE PARA QUE SE VEA LA TEXTURA
  scene.add(new THREE.AmbientLight(0xffffff, 1.5));
  const light = new THREE.PointLight(0xffffff, 1);
  light.position.set(10, 10, 10);
  scene.add(light);

  // TEXTURA
  const textureLoader = new THREE.TextureLoader();
  const goldTexture = textureLoader.load('image.png');
  goldTexture.wrapS = goldTexture.wrapT = THREE.RepeatWrapping;

  // CAJA CONTENEDORA
  const cW = 14, cH = 20, cD = 4;
  function createWall(w, h, d, x, y, z) {
    const body = new CANNON.Body({ mass: 0 });
    body.addShape(new CANNON.Box(new CANNON.Vec3(w/2, h/2, d/2)));
    body.position.set(x, y, z);
    world.addBody(body);
  }
  createWall(cW, 1, cD, 0, -8, 0); // Suelo
  createWall(1, cH, cD, -cW/2, 0, 0); // Izq
  createWall(1, cH, cD, cW/2, 0, 0);  // Der
  createWall(cW, cH, 1, 0, 0, -cD/2); // Atrás
  createWall(cW, cH, 1, 0, 0, cD/2);  // Frente

  const objects = [];
  const loader = new THREE.GLTFLoader();

  loader.load('Meshy_AI_morango_0506164222_texture.glb', (gltf) => {
    const master = gltf.scene;
    for (let i = 0; i < 120; i++) {
      const model = master.clone();
      const s = 0.2 + Math.random() * 0.4;
      model.scale.set(s, s, s);

      model.traverse(n => {
        if (n.isMesh) {
          // Cambiado a Lambert para que la textura sea SIEMPRE visible
          n.material = new THREE.MeshLambertMaterial({
            map: goldTexture,
            color: 0xffffff
          });
        }
      });

      const body = new CANNON.Body({ mass: 1 });
      body.addShape(new CANNON.Sphere(s * 1.5));
      body.position.set((Math.random()-0.5)*8, 10 + Math.random()*15, (Math.random()-0.5)*2);
      
      world.addBody(body);
      scene.add(model);
      objects.push({ mesh: model, body: body });
    }
  });

  function loop() {
    world.step(1/60);
    objects.forEach(o => {
      o.mesh.position.copy(o.body.position);
      o.mesh.quaternion.copy(o.body.quaternion);
    });
    renderer.render(scene, camera);
    requestAnimationFrame(loop);
  }
  
  window.onresize = () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  };

  loop();
})();
</script>
</body>
</html>
