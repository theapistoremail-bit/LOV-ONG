<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LOVE ONG – KIMERICA</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@900&family=Space+Mono:wght@400&display=swap');
  
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { margin: 0; overflow: hidden; background: #ff0000; }

  /* NAV REPARADO: Ahora es clickeable 100% */
  nav {
    position: absolute;
    top: 0; left: 0; width: 100%;
    padding: 30px 40px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    z-index: 10000; /* Por encima de todo */
  }

  .brand {
    font-family: 'Space Mono', monospace;
    font-size: 0.85rem;
    letter-spacing: 0.6em;
    color: #ffffff;
    text-transform: uppercase;
    text-decoration: none;
    pointer-events: auto;
  }

  .menu-btn {
    width: 32px; height: 12px;
    display: flex; flex-direction: column; justify-content: space-between;
    cursor: pointer; pointer-events: auto;
  }

  .menu-btn span { display: block; width: 100%; height: 2px; background: #ffffff; }

  #title {
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 100%; text-align: center;
    font-family: 'Playfair Display', serif;
    font-size: clamp(3rem, 15vw, 10rem);
    letter-spacing: 0.3em;
    color: #ffffff;
    z-index: 1; /* Detrás de los objetos */
    pointer-events: none;
    opacity: 0.9;
  }

  canvas { position: absolute; top: 0; left: 0; z-index: 10; }
</style>
</head>
<body>

<nav>
  <a href="#" class="brand">KIMERICA</a>
  <div class="menu-btn" onclick="alert('Menú activo')">
    <span></span>
    <span></span>
  </div>
</nav>

<div id="title">LOVE ONG</div>
<canvas id="canvas3d"></canvas>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

<script>
(function() {
  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 1, 1000);
  const renderer = new THREE.WebGLRenderer({ 
    canvas: document.getElementById('canvas3d'), 
    antialias: true,
    alpha: true 
  });
  
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 2.5;

  camera.position.z = 30;

  // LUCES MASIVAS PARA EL DORADO
  const amb = new THREE.AmbientLight(0xffffff, 1);
  scene.add(amb);
  
  const sun = new THREE.DirectionalLight(0xffffff, 3);
  sun.position.set(5, 20, 10);
  scene.add(sun);

  const point = new THREE.PointLight(0xffaa00, 5);
  point.position.set(-10, 0, 10);
  scene.add(point);

  const objects = [];
  const loader = new THREE.GLTFLoader();

  // Función para crear objetos físicos
  function createObject(geometryOrScene, isModel = false) {
    for (let i = 0; i < 40; i++) {
      let mesh;
      if (isModel) {
        mesh = geometryOrScene.clone();
      } else {
        const mat = new THREE.MeshStandardMaterial({ color: 0xffd700, metalness: 1, roughness: 0.1 });
        mesh = new THREE.Mesh(new THREE.IcosahedronGeometry(1, 0), mat);
      }

      const s = 1.5 + Math.random() * 2;
      mesh.scale.set(s, s, s);

      mesh.traverse(n => {
        if (n.isMesh) {
          n.material.metalness = 1.0;
          n.material.roughness = 0.05;
          n.material.color.setHex(0xffaa00);
        }
      });

      mesh.position.set((Math.random() - 0.5) * 20, Math.random() * 20, (Math.random() - 0.5) * 5);
      scene.add(mesh);
      objects.push({
        mesh: mesh,
        r: s,
        v: new THREE.Vector2(0, -10),
        drag: false
      });
    }
  }

  // CARGAR MODELO
  loader.load('Meshy_AI_morango_0506164222_texture.glb', 
    (gltf) => {
      createObject(gltf.scene, true);
    },
    undefined,
    (error) => {
      console.error("No se pudo cargar el GLB, usando objetos de respaldo");
      createObject(null, false); // Crear cubos dorados si falla el modelo
    }
  );

  function loop() {
    const dt = 0.016;
    const floor = -12;
    const wall = 15;

    objects.forEach((o) => {
      if (!o.drag) {
        o.v.y += -30 * dt;
        o.mesh.position.y += o.v.y * dt;
        o.mesh.position.x += o.v.x * dt;

        if (o.mesh.position.y < floor) {
          o.mesh.position.y = floor;
          o.v.y *= -0.3;
        }
        if (Math.abs(o.mesh.position.x) > wall) {
          o.v.x *= -0.5;
          o.mesh.position.x = Math.sign(o.mesh.position.x) * wall;
        }
      }
      o.mesh.rotation.x += 0.01;
      o.mesh.rotation.y += 0.01;
    });

    renderer.render(scene, camera);
    requestAnimationFrame(loop);
  }

  // INTERACCION REPARADA
  const ray = new THREE.Raycaster();
  const mouse = new THREE.Vector2();
  let active = null;

  window.addEventListener('mousedown', (e) => {
    mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
    ray.setFromCamera(mouse, camera);
    const hits = ray.intersectObjects(objects.map(o => o.mesh), true);
    if (hits.length > 0) {
      let root = hits[0].object;
      while(root.parent && !objects.find(o => o.mesh === root)) root = root.parent;
      active = objects.find(o => o.mesh === root);
      if (active) active.drag = true;
    }
  });

  window.addEventListener('mousemove', (e) => {
    if (!active) return;
    mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
    const vector = new THREE.Vector3(mouse.x, mouse.y, 0.5).unproject(camera);
    const dir = vector.sub(camera.position).normalize();
    const distance = -camera.position.z / dir.z;
    const pos = camera.position.clone().add(dir.multiplyScalar(distance));
    active.mesh.position.copy(pos);
  });

  window.addEventListener('mouseup', () => { if(active) active.drag = false; active = null; });

  loop();
})();
</script>
</body>
</html>
