<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ONG – INTERACTIVE GOLD</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@900&family=Space+Mono:wght@400&display=swap');
  
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { margin: 0; overflow: hidden; background: #ff0000; }

  /* NAVEGACIÓN: z-index altísimo para que siempre funcione */
  nav {
    position: fixed;
    top: 0; left: 0; width: 100%;
    padding: 30px 40px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    z-index: 10000;
  }

  .brand {
    font-family: 'Space Mono', monospace;
    font-size: 0.9rem;
    letter-spacing: 0.6em;
    color: #ffffff;
    text-transform: uppercase;
    text-decoration: none;
    pointer-events: auto; /* Permite clics */
  }

  .menu-btn {
    width: 32px; height: 12px;
    display: flex; flex-direction: column; justify-content: space-between;
    cursor: pointer;
    pointer-events: auto; /* Permite clics */
  }

  .menu-btn span { display: block; width: 100%; height: 2px; background: #ffffff; }

  /* TÍTULO ENFRENTE DE TODO */
  #title {
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 100%; text-align: center;
    font-family: 'Playfair Display', serif;
    font-size: clamp(3rem, 18vw, 12rem);
    letter-spacing: 0.1em;
    color: #ffffff;
    z-index: 500; /* Por encima de las fresas */
    pointer-events: none; /* No bloquea el toque de las fresas */
    white-space: nowrap;
  }

  /* CANVAS DETRÁS DEL TÍTULO */
  canvas { 
    position: absolute; 
    top: 0; left: 0; 
    z-index: 10; /* Detrás del título (500) y el nav (10000) */
    outline: none; 
    cursor: grab;
  }
  canvas:active { cursor: grabbing; }
</style>
</head>
<body>

<nav>
  <a href="#" class="brand" onclick="console.log('ONG clicked')">ONG</a>
  <div class="menu-btn" onclick="alert('Menú activo')">
    <span></span>
    <span></span>
  </div>
</nav>

<div id="title">LOVE ONG</div>
<canvas id="canvas3d"></canvas>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

<script>
(function() {
  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(35, window.innerWidth / window.innerHeight, 0.1, 1000);
  const renderer = new THREE.WebGLRenderer({ 
    canvas: document.getElementById('canvas3d'), 
    antialias: true,
    alpha: true 
  });
  
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 2.8;

  camera.position.z = 25;

  // ILUMINACIÓN PREMIUM
  scene.add(new THREE.AmbientLight(0xffffff, 0.6));
  const sun = new THREE.DirectionalLight(0xffffff, 4);
  sun.position.set(5, 15, 10);
  scene.add(sun);
  const point = new THREE.PointLight(0xffaa00, 5);
  point.position.set(-10, -5, 15);
  scene.add(point);

  const objects = [];
  const loader = new THREE.GLTFLoader();

  let vSize = { w: 0, h: 0 };
  function updateLimits() {
    const fov = (camera.fov * Math.PI) / 180;
    vSize.h = 2 * Math.tan(fov / 2) * camera.position.z;
    vSize.w = vSize.h * camera.aspect;
  }
  updateLimits();

  loader.load('Meshy_AI_morango_0506164222_texture.glb', (gltf) => {
    const master = gltf.scene;
    const count = 160;

    for (let i = 0; i < count; i++) {
      const model = master.clone();
      const s = Math.random() > 0.8 ? (2.2 + Math.random() * 1.5) : (0.5 + Math.random() * 1.0);
      model.scale.set(s, s, s);

      model.traverse(n => {
        if (n.isMesh) {
          n.material.color.setHex(0xFFD700); 
          n.material.metalness = 1.0;
          n.material.roughness = 0.08;
          n.material.emissive = new THREE.Color(0x331a00);
          n.material.emissiveIntensity = 0.4;
        }
      });

      model.position.set(
        (Math.random() - 0.5) * vSize.w * 1.5,
        (Math.random() - 0.5) * vSize.h * 3,
        (Math.random() - 0.5) * 5
      );

      const item = {
        mesh: model,
        speed: 0.04 + Math.random() * 0.1, 
        rot: new THREE.Vector3(Math.random()*0.02, Math.random()*0.02, Math.random()*0.02),
        isDragging: false
      };

      scene.add(model);
      objects.push(item);
    }
  });

  // FÍSICA Y ANIMACIÓN
  function loop() {
    objects.forEach(o => {
      if (!o.isDragging) {
        o.mesh.position.y -= o.speed;
        o.mesh.rotation.x += o.rot.x;
        o.mesh.rotation.y += o.rot.y;

        if (o.mesh.position.y < -vSize.h / 1.5) {
          o.mesh.position.y = vSize.h / 1.2;
          o.mesh.position.x = (Math.random() - 0.5) * vSize.w * 1.5;
        }
      }
    });

    renderer.render(scene, camera);
    requestAnimationFrame(loop);
  }

  // INTERACCIÓN MOUSE / TOUCH
  const raycaster = new THREE.Raycaster();
  const mouse = new THREE.Vector2();
  let selectedObject = null;

  function getMousePos(e) {
    const x = e.touches ? e.touches[0].clientX : e.clientX;
    const y = e.touches ? e.touches[0].clientY : e.clientY;
    mouse.x = (x / window.innerWidth) * 2 - 1;
    mouse.y = -(y / window.innerHeight) * 2 + 1;
  }

  function onDown(e) {
    if (e.target.closest('nav')) return; // Prioridad al menú
    getMousePos(e);
    raycaster.setFromCamera(mouse, camera);
    const intersects = raycaster.intersectObjects(objects.map(o => o.mesh), true);
    
    if (intersects.length > 0) {
      let root = intersects[0].object;
      while(root.parent && !objects.find(o => o.mesh === root)) root = root.parent;
      selectedObject = objects.find(o => o.mesh === root);
      if (selectedObject) selectedObject.isDragging = true;
    }
  }

  function onMove(e) {
    if (!selectedObject) return;
    getMousePos(e);
    const vector = new THREE.Vector3(mouse.x, mouse.y, 0.5).unproject(camera);
    const dir = vector.sub(camera.position).normalize();
    const distance = -camera.position.z / dir.z;
    const pos = camera.position.clone().add(dir.multiplyScalar(distance));
    selectedObject.mesh.position.copy(pos);
  }

  function onUp() {
    if (selectedObject) selectedObject.isDragging = false;
    selectedObject = null;
  }

  window.addEventListener('mousedown', onDown);
  window.addEventListener('touchstart', onDown);
  window.addEventListener('mousemove', onMove);
  window.addEventListener('touchmove', onMove);
  window.addEventListener('mouseup', onUp);
  window.addEventListener('touchend', onUp);

  window.addEventListener('resize', () => {
    renderer.setSize(window.innerWidth, window.innerHeight);
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    updateLimits();
  });

  loop();
})();
</script>
</body>
</html>
